<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work Hours</title>
  <meta name="description" content="Calculate work hours and minutes." />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Work Hours" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">&#9788;</button>

  <main class="card">
    <h1>Work Hours</h1>
    <p class="sub">Slide to set time</p>

    <section>
      <label>Start</label>
      <div class="time-row">
        <div class="slide-picker" id="startHourPicker"></div>
        <span class="sep">:</span>
        <div class="slide-picker" id="startMinPicker"></div>
        <select id="startPer" class="per">
          <option value="AM">AM</option>
          <option value="PM">PM</option>
        </select>
      </div>
    </section>

    <section>
      <label>End</label>
      <div class="time-row">
        <div class="slide-picker" id="endHourPicker"></div>
        <span class="sep">:</span>
        <div class="slide-picker" id="endMinPicker"></div>
        <select id="endPer" class="per">
          <option value="AM">AM</option>
          <option value="PM">PM</option>
        </select>
      </div>
    </section>

    <p class="err" id="errorMsg"></p>

    <button class="btn btn-primary" id="calcBtn">Calculate</button>

    <div class="stats" id="statsWrap" style="display:none">
      <div class="stat"><span class="stat-val" id="resHm">--</span><span class="stat-lbl">Worked</span></div>
      <div class="stat"><span class="stat-val" id="resMin">--</span><span class="stat-lbl">Minutes</span></div>
    </div>

    <div class="bar-wrap" id="barWrap" style="display:none">
      <div class="bar-fill" id="barFill"></div>
    </div>

    <div class="actions" id="actionsWrap" style="display:none">
      <button class="btn btn-outline" id="copyBtn">Copy</button>
      <button class="btn btn-outline" id="resetBtn">Reset</button>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js");
      });
    }
  </script>
</body>
</html>
