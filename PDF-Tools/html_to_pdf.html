<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#2f4a76">
    <title>HTML to PDF Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #64748b;
            --accent-color: #dbeafe;
            --success-color: #10b981;
            --danger-color: #dc2626;
            --border-radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
            min-height: 100vh;
            padding: 20px;
            color: #1e3a8a;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .content {
            padding: 30px;
        }

        label {
            display: block;
            font-weight: 600;
            margin: 15px 0 8px;
            color: var(--secondary-color);
            font-size: 0.95em;
        }

        textarea {
            width: 100%;
            min-height: 300px;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius);
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius);
            font-size: 1em;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
            padding: 20px;
            background: #f8fafc;
            border-radius: var(--border-radius);
        }

        .option-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        select {
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius);
            font-size: 1em;
            background: white;
        }

        select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        button:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }

        #status {
            padding: 12px;
            border-radius: var(--border-radius);
            margin: 15px 0;
            text-align: center;
            display: none;
        }

        #status.show {
            display: block;
        }

        #status.success {
            background: #d1fae5;
            color: var(--success-color);
        }

        #status.error {
            background: #fee2e2;
            color: var(--danger-color);
        }

        #status.loading {
            background: #e0f2fe;
            color: #0284c7;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: var(--border-radius);
            transition: background 0.3s;
            margin-bottom: 10px;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .info-box {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 12px;
            margin: 15px 0;
            border-radius: 4px;
        }

        .info-box p {
            color: #92400e;
            font-size: 0.9em;
            margin: 0;
        }

        .sample-templates {
            margin: 15px 0;
        }

        .template-btn {
            display: inline-block;
            padding: 8px 16px;
            margin: 5px;
            background: #e0f2fe;
            border: 2px solid #7dd3fc;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .template-btn:hover {
            background: #bae6fd;
            border-color: var(--primary-color);
        }

        @media (max-width: 768px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="theme-init.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="premium-theme.css">
</head>

<body>
    <div class="container">
        <header>
            <a href="index.html" class="back-button">
                <i class="fas fa-arrow-left"></i> Back to Tools
            </a>
            <h1><i class="fas fa-file-code"></i> HTML to PDF</h1>
            <p>Convert HTML snippets and templates into polished PDFs - fully client side</p>
        </header>

        <div class="content">
            <div id="status"></div>

            <div id="htmlTab">
                <div class="info-box">
                    <p><i class="fas fa-lightbulb"></i> Paste your HTML and convert instantly. URL scraping mode was removed for reliability and privacy.</p>
                </div>

                <div class="sample-templates">
                    <strong>Quick Templates:</strong>
                    <span class="template-btn" onclick="loadTemplate('basic')">Basic Document</span>
                    <span class="template-btn" onclick="loadTemplate('invoice')">Invoice</span>
                    <span class="template-btn" onclick="loadTemplate('resume')">Resume</span>
                </div>

                <label>HTML Content</label>
                <textarea id="htmlContent" placeholder="Enter your HTML code here..."><!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        h1 { color: #2563eb; }
        .content { margin: 20px 0; }
    </style>
</head>
<body>
    <h1>Sample PDF Document</h1>
    <div class="content">
        <p>This is a sample HTML to PDF conversion.</p>
        <ul>
            <li>Easy to use</li>
            <li>Supports CSS styling</li>
            <li>Client-side processing</li>
        </ul>
    </div>
</body>
</html></textarea>

                <div class="options-grid">
                    <div class="option-item">
                        <label>Page Size</label>
                        <select id="pageSize">
                            <option value="a4">A4</option>
                            <option value="letter">Letter</option>
                            <option value="legal">Legal</option>
                            <option value="a3">A3</option>
                        </select>
                    </div>

                    <div class="option-item">
                        <label>Orientation</label>
                        <select id="orientation">
                            <option value="portrait">Portrait</option>
                            <option value="landscape">Landscape</option>
                        </select>
                    </div>

                    <div class="option-item">
                        <label>Margin (mm)</label>
                        <select id="margin">
                            <option value="10">10mm</option>
                            <option value="15" selected>15mm</option>
                            <option value="20">20mm</option>
                            <option value="25">25mm</option>
                        </select>
                    </div>

                    <div class="option-item">
                        <label>Filename</label>
                        <input type="text" id="filename" value="document.pdf">
                    </div>
                </div>

                <button id="convertBtn">
                    <i class="fas fa-file-pdf"></i>
                    Convert to PDF
                </button>
            </div>
        </div>
    </div>

    <script>
        // Templates
        function loadTemplate(type) {
            let template = '';
            
            switch(type) {
                case 'basic':
                    template = `<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; line-height: 1.6; }
        h1 { color: #2563eb; border-bottom: 3px solid #2563eb; padding-bottom: 10px; }
        h2 { color: #64748b; margin-top: 20px; }
        p { margin: 15px 0; }
    </style>
</head>
<body>
    <h1>Document Title</h1>
    <h2>Section 1</h2>
    <p>Your content here...</p>
    <h2>Section 2</h2>
    <p>More content...</p>
</body>
</html>`;
                    break;
                
                case 'invoice':
                    template = `<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; }
        .header { text-align: center; margin-bottom: 30px; }
        .company { font-size: 24px; font-weight: bold; color: #2563eb; }
        .invoice-info { margin: 20px 0; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2563eb; color: white; }
        .total { text-align: right; font-size: 18px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="company">Your Company Name</div>
        <div>Invoice #12345</div>
    </div>
    <div class="invoice-info">
        <strong>Date:</strong> January 1, 2024<br>
        <strong>To:</strong> Customer Name
    </div>
    <table>
        <tr>
            <th>Description</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Total</th>
        </tr>
        <tr>
            <td>Item 1</td>
            <td>2</td>
            <td>$50.00</td>
            <td>$100.00</td>
        </tr>
        <tr>
            <td>Item 2</td>
            <td>1</td>
            <td>$75.00</td>
            <td>$75.00</td>
        </tr>
    </table>
    <div class="total">Total: $175.00</div>
</body>
</html>`;
                    break;
                
                case 'resume':
                    template = `<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; line-height: 1.6; }
        .name { font-size: 28px; font-weight: bold; color: #2563eb; }
        .contact { color: #64748b; margin-bottom: 20px; }
        .section { margin: 20px 0; }
        .section-title { font-size: 20px; color: #2563eb; border-bottom: 2px solid #2563eb; padding-bottom: 5px; margin-bottom: 10px; }
        .job-title { font-weight: bold; }
        .date { color: #64748b; font-style: italic; }
    </style>
</head>
<body>
    <div class="name">Your Name</div>
    <div class="contact">email@example.com | (123) 456-7890</div>
    
    <div class="section">
        <div class="section-title">Experience</div>
        <div class="job-title">Job Title - Company Name</div>
        <div class="date">January 2020 - Present</div>
        <p>Job description and responsibilities...</p>
    </div>
    
    <div class="section">
        <div class="section-title">Education</div>
        <div class="job-title">Degree - University Name</div>
        <div class="date">2015 - 2019</div>
    </div>
</body>
</html>`;
                    break;
            }
            
            document.getElementById('htmlContent').value = template;
        }

        // Convert HTML to PDF
        document.getElementById('convertBtn').addEventListener('click', async function() {
            const htmlContent = document.getElementById('htmlContent').value;
            if (!htmlContent.trim()) {
                showStatus('Please enter HTML content', 'error');
                return;
            }

            try {
                showStatus('Converting to PDF... Please wait', 'loading');
                this.disabled = true;

                const pageSize = document.getElementById('pageSize').value;
                const orientation = document.getElementById('orientation').value;
                const margin = parseInt(document.getElementById('margin').value);
                const filename = document.getElementById('filename').value;

                // Create a temporary element
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = htmlContent;
                tempDiv.style.width = '100%';
                document.body.appendChild(tempDiv);

                const opt = {
                    margin: margin,
                    filename: filename,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true },
                    jsPDF: { unit: 'mm', format: pageSize, orientation: orientation }
                };

                await html2pdf().set(opt).from(tempDiv).save();

                document.body.removeChild(tempDiv);
                showStatus('✓ PDF created successfully!', 'success');

            } catch (error) {
                console.error('Error converting to PDF:', error);
                showStatus('Error: ' + error.message, 'error');
            } finally {
                this.disabled = false;
            }
        });

        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `show ${type}`;
            
            if (type === 'success') {
                setTimeout(() => {
                    status.classList.remove('show');
                }, 5000);
            }
        }
    </script>
    <script src="tool-registry.js"></script>
    <script src="premium-ui.js"></script>
</body>

</html>
