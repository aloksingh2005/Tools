<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#2f4a76">
    <title>Sign PDF - Add Signature</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --primary-color: #0891b2;
            --secondary-color: #64748b;
            --accent-color: #cffafe;
            --success-color: #10b981;
            --danger-color: #dc2626;
            --border-radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #cffafe 0%, #a5f3fc 100%);
            min-height: 100vh;
            padding: 20px;
            color: #164e63;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .content {
            padding: 30px;
        }

        label {
            display: block;
            font-weight: 600;
            margin: 15px 0 8px;
            color: var(--secondary-color);
            font-size: 0.95em;
        }

        input[type="file"] {
            display: none;
        }

        #dropZone {
            border: 2px dashed #67e8f9;
            border-radius: var(--border-radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--accent-color);
            margin-bottom: 20px;
        }

        #dropZone:hover,
        #dropZone.dragover {
            border-color: var(--primary-color);
            background: #ecfeff;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        #dropZone i {
            font-size: 3em;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        #dropZone p {
            margin: 10px 0;
            color: var(--secondary-color);
        }

        #dropZone .highlight {
            color: var(--primary-color);
            font-weight: 600;
        }

        .signature-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        .signature-type {
            background: #f8fafc;
            padding: 20px;
            border-radius: var(--border-radius);
            border: 2px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .signature-type:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .signature-type.active {
            border-color: var(--primary-color);
            background: var(--accent-color);
        }

        .signature-type i {
            font-size: 2.5em;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .signature-type h3 {
            margin-bottom: 5px;
            color: var(--primary-color);
        }

        .canvas-container {
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius);
            background: white;
            margin: 20px 0;
            text-align: center;
            display: none;
        }

        .canvas-container.show {
            display: block;
        }

        #signatureCanvas {
            cursor: crosshair;
            display: block;
            margin: 0 auto;
            touch-action: none;
        }

        .canvas-controls {
            padding: 15px;
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .color-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.active {
            border-color: var(--primary-color);
            transform: scale(1.15);
        }

        .text-signature {
            display: none;
            margin: 20px 0;
        }

        .text-signature.show {
            display: block;
        }

        .text-input {
            width: 100%;
            padding: 15px;
            font-size: 2em;
            font-family: 'Brush Script MT', cursive;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius);
            text-align: center;
        }

        .font-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }

        .font-option {
            padding: 20px 10px;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius);
            cursor: pointer;
            text-align: center;
            font-size: 1.5em;
            transition: all 0.3s;
        }

        .font-option:hover {
            border-color: var(--primary-color);
        }

        .font-option.active {
            border-color: var(--primary-color);
            background: var(--accent-color);
        }

        .upload-signature {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .upload-signature.show {
            display: block;
        }

        #signaturePreview {
            max-width: 100%;
            max-height: 200px;
            margin: 15px 0;
            border: 2px dashed #e2e8f0;
            border-radius: var(--border-radius);
            padding: 10px;
        }

        button {
            padding: 12px 24px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: #0e7490;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }

        button.secondary {
            background: #64748b;
        }

        button.secondary:hover {
            background: #475569;
        }

        button.full-width {
            width: 100%;
            justify-content: center;
            padding: 14px;
            font-size: 1.1em;
            margin-top: 20px;
        }

        #status {
            padding: 12px;
            border-radius: var(--border-radius);
            margin: 15px 0;
            text-align: center;
            display: none;
        }

        #status.show {
            display: block;
        }

        #status.success {
            background: #d1fae5;
            color: var(--success-color);
        }

        #status.error {
            background: #fee2e2;
            color: var(--danger-color);
        }

        #status.loading {
            background: #e0f2fe;
            color: #0284c7;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: var(--border-radius);
            transition: background 0.3s;
            margin-bottom: 10px;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 768px) {
            .signature-section {
                grid-template-columns: 1fr;
            }

            .font-selector {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
    <script src="theme-init.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="premium-theme.css">
</head>

<body>
    <div class="container">
        <header>
            <a href="index.html" class="back-button">
                <i class="fas fa-arrow-left"></i> Back to Tools
            </a>
            <h1><i class="fas fa-signature"></i> Sign PDF</h1>
            <p>Add your signature to PDF documents</p>
        </header>

        <div class="content">
            <label for="pdfFile">
                <i class="fas fa-file-pdf"></i> Select PDF File
            </label>
            <div id="dropZone">
                <i class="fas fa-cloud-upload-alt"></i>
                <p><span class="highlight">Click to upload</span> or drag and drop</p>
                <p style="font-size: 0.9em;">Only PDF files are accepted</p>
            </div>
            <input type="file" id="pdfFile" accept=".pdf">

            <div id="status"></div>

            <div id="signatureOptions" style="display: none;">
                <h3 style="margin: 20px 0; color: var(--primary-color);">Choose Signature Type</h3>
                <div class="signature-section">
                    <div class="signature-type active" data-type="draw">
                        <i class="fas fa-pen"></i>
                        <h3>Draw</h3>
                        <p>Draw your signature</p>
                    </div>
                    <div class="signature-type" data-type="type">
                        <i class="fas fa-keyboard"></i>
                        <h3>Type</h3>
                        <p>Type your name</p>
                    </div>
                </div>

                <!-- Draw Signature -->
                <div class="canvas-container show" id="drawContainer">
                    <div class="canvas-controls">
                        <div class="color-selector">
                            <span style="font-weight: 600; margin-right: 10px;">Color:</span>
                            <div class="color-option active" data-color="#000000" style="background: #000000;"></div>
                            <div class="color-option" data-color="#0891b2" style="background: #0891b2;"></div>
                            <div class="color-option" data-color="#dc2626" style="background: #dc2626;"></div>
                            <div class="color-option" data-color="#7c3aed" style="background: #7c3aed;"></div>
                        </div>
                        <button class="secondary" onclick="clearCanvas()">
                            <i class="fas fa-eraser"></i> Clear
                        </button>
                    </div>
                    <canvas id="signatureCanvas" width="600" height="200"></canvas>
                </div>

                <!-- Type Signature -->
                <div class="text-signature" id="typeContainer">
                    <input type="text" class="text-input" id="signatureText" placeholder="Type your name">
                    <div class="font-selector">
                        <div class="font-option active" data-font="cursive" style="font-family: 'Brush Script MT', cursive;">Signature</div>
                        <div class="font-option" data-font="'Dancing Script', cursive" style="font-family: 'Dancing Script', cursive;">Dancing</div>
                        <div class="font-option" data-font="'Pacifico', cursive" style="font-family: 'Pacifico', cursive;">Pacifico</div>
                        <div class="font-option" data-font="'Great Vibes', cursive" style="font-family: 'Great Vibes', cursive;">Great Vibes</div>
                    </div>
                </div>

                <button class="full-width" id="addSignatureBtn">
                    <i class="fas fa-plus-circle"></i> Add Signature to PDF
                </button>
            </div>
        </div>
    </div>

    <script>
        const { PDFDocument, rgb } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let selectedFile = null;
        let pdfDoc = null;
        let currentSignatureType = 'draw';
        let signatureDataURL = null;
        let signatureColor = '#000000';
        let signatureFont = 'cursive';
        let isDrawing = false;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('pdfFile');
        const canvas = document.getElementById('signatureCanvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');

        // Setup canvas
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Drag and drop handlers
        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type === 'application/pdf') {
                handleFileSelection(files[0]);
            } else {
                showStatus('Please drop a valid PDF file', 'error');
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelection(e.target.files[0]);
            }
        });

        async function handleFileSelection(file) {
            selectedFile = file;
            showStatus('PDF loaded successfully. Create your signature below.', 'success');
            document.getElementById('signatureOptions').style.display = 'block';
        }

        // Signature type selection
        document.querySelectorAll('.signature-type').forEach(type => {
            type.addEventListener('click', function() {
                document.querySelectorAll('.signature-type').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentSignatureType = this.dataset.type;

                document.getElementById('drawContainer').classList.remove('show');
                document.getElementById('typeContainer').classList.remove('show');

                if (currentSignatureType === 'draw') {
                    document.getElementById('drawContainer').classList.add('show');
                } else {
                    document.getElementById('typeContainer').classList.add('show');
                }
            });
        });

        // Canvas drawing
        let lastX = 0;
        let lastY = 0;

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        // Touch events
        canvas.addEventListener('touchstart', handleTouch);
        canvas.addEventListener('touchmove', handleTouch);
        canvas.addEventListener('touchend', stopDrawing);

        function startDrawing(e) {
            isDrawing = true;
            [lastX, lastY] = [e.offsetX, e.offsetY];
        }

        function draw(e) {
            if (!isDrawing) return;
            ctx.strokeStyle = signatureColor;
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
            [lastX, lastY] = [e.offsetX, e.offsetY];
        }

        function stopDrawing() {
            isDrawing = false;
        }

        function handleTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;

            if (e.type === 'touchstart') {
                isDrawing = true;
                [lastX, lastY] = [x, y];
            } else if (e.type === 'touchmove' && isDrawing) {
                ctx.strokeStyle = signatureColor;
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);
                ctx.stroke();
                [lastX, lastY] = [x, y];
            }
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Color selection
        document.querySelectorAll('.color-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.color-option').forEach(o => o.classList.remove('active'));
                this.classList.add('active');
                signatureColor = this.dataset.color;
            });
        });

        // Font selection
        document.querySelectorAll('.font-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.font-option').forEach(o => o.classList.remove('active'));
                this.classList.add('active');
                signatureFont = this.dataset.font;
                document.getElementById('signatureText').style.fontFamily = signatureFont;
            });
        });

        // Add signature to PDF
        document.getElementById('addSignatureBtn').addEventListener('click', addSignatureToPDF);

        async function addSignatureToPDF() {
            if (!selectedFile) {
                showStatus('Please select a PDF file first', 'error');
                return;
            }

            try {
                showStatus('Adding signature to PDF...', 'loading');

                // Generate signature image
                let signatureImage;
                if (currentSignatureType === 'draw') {
                    signatureImage = canvas.toDataURL('image/png');
                } else {
                    // Create signature from text
                    const textCanvas = document.createElement('canvas');
                    textCanvas.width = 600;
                    textCanvas.height = 200;
                    const textCtx = textCanvas.getContext('2d');
                    textCtx.fillStyle = 'white';
                    textCtx.fillRect(0, 0, textCanvas.width, textCanvas.height);
                    textCtx.fillStyle = signatureColor || '#000000';
                    textCtx.font = `60px ${signatureFont}`;
                    textCtx.textAlign = 'center';
                    textCtx.textBaseline = 'middle';
                    textCtx.fillText(document.getElementById('signatureText').value || 'Signature', 300, 100);
                    signatureImage = textCanvas.toDataURL('image/png');
                }

                // Load PDF
                const arrayBuffer = await selectedFile.arrayBuffer();
                const pdfDoc = await PDFDocument.load(arrayBuffer);

                // Embed signature
                const signatureImageBytes = await fetch(signatureImage).then(res => res.arrayBuffer());
                const signatureImg = await pdfDoc.embedPng(signatureImageBytes);

                // Add to last page (you can modify this to add on specific page)
                const pages = pdfDoc.getPages();
                const lastPage = pages[pages.length - 1];
                const { width, height } = lastPage.getSize();

                // Position signature at bottom right
                const sigWidth = 150;
                const sigHeight = 50;
                const x = width - sigWidth - 50;
                const y = 50;

                lastPage.drawImage(signatureImg, {
                    x: x,
                    y: y,
                    width: sigWidth,
                    height: sigHeight,
                });

                // Save PDF
                const pdfBytes = await pdfDoc.save();

                // Download
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = selectedFile.name.replace('.pdf', '_signed.pdf');
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                showStatus('✓ PDF signed and downloaded successfully!', 'success');

            } catch (error) {
                console.error('Error signing PDF:', error);
                showStatus('Error: ' + error.message, 'error');
            }
        }

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `show ${type}`;
            
            if (type === 'success') {
                setTimeout(() => {
                    status.classList.remove('show');
                }, 5000);
            }
        }
    </script>
    <script src="tool-registry.js"></script>
    <script src="premium-ui.js"></script>
</body>

</html>
