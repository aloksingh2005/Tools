<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#2f4a76">
    <title>PDF Splitter (JS Edition)</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root {
            --primary-color: #3b82f6;
            --secondary-color: #64748b;
            --accent-color: #f1f5f9;
            --success-color: #10b981;
            --border-radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            padding: 20px;
            color: #334155;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .content {
            padding: 30px;
        }

        label {
            display: block;
            font-weight: 600;
            margin: 15px 0 8px;
            color: var(--secondary-color);
            font-size: 0.95em;
        }

        input[type="file"] {
            display: none;
        }

        #dropZone {
            border: 2px dashed #cbd5e1;
            border-radius: var(--border-radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--accent-color);
            margin-bottom: 20px;
        }

        #dropZone:hover, #dropZone.dragover {
            border-color: var(--primary-color);
            background: #eff6ff;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        #dropZone i {
            font-size: 3em;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        #dropZone span {
            display: block;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        #dropZone small {
            color: var(--secondary-color);
        }

        #fileName {
            font-weight: 500;
            color: var(--primary-color);
            margin-top: 10px;
        }

        #info {
            margin: 15px 0;
            padding: 12px;
            border-radius: var(--border-radius);
            background: var(--accent-color);
            border-left: 4px solid var(--primary-color);
            font-weight: 500;
        }

        #info.success {
            background: #ecfdf5;
            border-color: var(--success-color);
            color: #166534;
        }

        #info.error {
            background: #fef2f2;
            border-color: #ef4444;
            color: #991b1b;
        }

        select, input[type="text"], input[type="radio"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: var(--border-radius);
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        input[type="radio"] { width: auto; }

        .radio-group {
            margin-left: 20px;
            margin-bottom: 10px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            padding: 8px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
            margin: 5px 0;
        }

        .radio-group label:hover {
            background: var(--accent-color);
        }

        .radio-group input[type="radio"] {
            margin-right: 10px;
            accent-color: var(--primary-color);
        }

        #rangeEntry {
            display: none;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        button:hover:not(:disabled) {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        @media (max-width: 480px) {
            .content {
                padding: 20px;
            }
            header h1 {
                font-size: 1.5em;
            }
        }
    </style>
    <script src="theme-init.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="premium-theme.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-cut"></i> PDF Splitter</h1>
            <p>Split PDFs by range or into individual pages, then download a ZIP.</p>
        </header>

        <div class="content">
            <label for="fileInput">
                <div id="dropZone">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Drop your PDF here or click to browse</span>
                    <small>Split long PDFs by page range.</small>
                    <div id="fileName"></div>
                </div>
            </label>
            <input type="file" id="fileInput" accept=".pdf">

            <div id="info"></div>

            <label>Split Mode:</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="mode" value="all" checked>
                    <span>Split All Pages (individual files)</span>
                </label>
                <label>
                    <input type="radio" name="mode" value="custom">
                    <span>Custom Range (e.g., 1-5,10 or 3-)</span>
                </label>
            </div>
            <input type="text" id="rangeEntry" placeholder="e.g., 1-5,10">

            <label>Output: (Downloads as ZIP – browser auto-save!)</label>
            <input type="text" placeholder="Auto-downloads 'split_pages.zip'" disabled>

            <button id="splitBtn" onclick="splitPDF()">
                <i class="fas fa-expand-arrows-alt"></i> Split PDF
            </button>
        </div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;

        // Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const info = document.getElementById('info');
        const splitBtn = document.getElementById('splitBtn');
        const modeRadios = document.getElementsByName('mode');
        const rangeEntry = document.getElementById('rangeEntry');
        const fileNameDiv = document.getElementById('fileName');

        let pdfDoc, totalPages;

        // Drag-drop events
        fileInput.addEventListener('change', loadFile);
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') {
                const dt = new DataTransfer();
                dt.items.add(file);
                fileInput.files = dt.files;
                loadFile({ target: fileInput });
            }
        });

        // Mode toggle
        modeRadios.forEach(input => {
            input.addEventListener('change', (e) => {
                rangeEntry.style.display = e.target.value === 'custom' ? 'block' : 'none';
                if (e.target.value === 'custom') {
                    rangeEntry.value = '1-';
                } else {
                    rangeEntry.value = '';
                }
            });
        });
        rangeEntry.style.display = 'none';  // Default

        async function loadFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            dropZone.querySelector('span').textContent = 'Processing...';
            fileNameDiv.textContent = file.name;
            info.textContent = 'Loading PDF...';
            info.className = '';

            try {
                const arrayBuffer = await file.arrayBuffer();
                pdfDoc = await PDFDocument.load(arrayBuffer);
                totalPages = pdfDoc.getPageCount();
                info.innerHTML = `<i class="fas fa-check"></i> Loaded: ${totalPages} pages ready to split!`;
                info.className = 'success';
                splitBtn.disabled = false;
            } catch (e) {
                info.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Couldn't load PDF: ${e.message}`;
                info.className = 'error';
                splitBtn.disabled = true;
            }
        }

        function parseRange(rangeStr, totalPages) {
            const pages = new Set();
            const parts = rangeStr.split(/,(?![^-])/).map(p => p.trim()).filter(Boolean);
            for (let part of parts) {
                if (part.includes('-')) {
                    const [startStr, endStr] = part.split('-');
                    const start = parseInt(startStr) || 1;
                    const end = parseInt(endStr) || totalPages;
                    for (let i = start - 1; i < end; i++) {
                        if (i >= 0 && i < totalPages) pages.add(i);
                    }
                } else {
                    const page = parseInt(part) - 1;
                    if (page >= 0 && page < totalPages) pages.add(page);
                }
            }
            return Array.from(pages).sort((a, b) => a - b);
        }

        async function splitPDF() {
            if (!pdfDoc) {
                info.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Select a PDF first!';
                info.className = 'error';
                return;
            }

            const mode = document.querySelector('input[name="mode"]:checked').value;
            let pageIndices;
            if (mode === 'all') {
                pageIndices = Array.from({ length: totalPages }, (_, i) => i);
            } else {
                const rangeStr = rangeEntry.value.trim();
                if (!rangeStr) {
                    info.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Enter a range (e.g., 1-5,10)!';
                    info.className = 'error';
                    return;
                }
                pageIndices = parseRange(rangeStr, totalPages);
                if (pageIndices.length === 0) {
                    info.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Invalid range – no pages selected!';
                    info.className = 'error';
                    return;
                }
            }

            splitBtn.disabled = true;
            splitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Splitting...';
            info.textContent = 'Splitting PDF...';

            try {
                const zip = new JSZip();
                for (let idx of pageIndices) {
                    const pageNum = idx + 1;
                    const newDoc = await PDFDocument.create();
                    const [copiedPage] = await newDoc.copyPages(pdfDoc, [idx]);
                    newDoc.addPage(copiedPage);
                    const pdfBytes = await newDoc.save();
                    zip.file(`page_${pageNum.toString().padStart(3, '0')}.pdf`, pdfBytes);
                }

                const zipBlob = await zip.generateAsync({ type: 'blob' });
                saveAs(zipBlob, `split_pages_${Date.now()}.zip`);
                info.innerHTML = `<i class="fas fa-check-circle"></i> Success! Split ${pageIndices.length} pages into ZIP – download complete!`;
                info.className = 'success';
            } catch (e) {
                info.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Split failed: ${e.message}`;
                info.className = 'error';
            } finally {
                splitBtn.disabled = false;
                splitBtn.innerHTML = '<i class="fas fa-expand-arrows-alt"></i> Split PDF';
            }
        }

        // Initial state
        splitBtn.disabled = true;
    </script>
    <script src="tool-registry.js"></script>
    <script src="premium-ui.js"></script>
</body>
</html>
