<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#2f4a76">
    <title>Rearrange PDF Pages</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --primary-color: #8b5cf6;
            --secondary-color: #64748b;
            --accent-color: #f3e8ff;
            --success-color: #10b981;
            --danger-color: #dc2626;
            --border-radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 100%);
            min-height: 100vh;
            padding: 20px;
            color: #6b21a8;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .content {
            padding: 30px;
        }

        label {
            display: block;
            font-weight: 600;
            margin: 15px 0 8px;
            color: var(--secondary-color);
            font-size: 0.95em;
        }

        input[type="file"] {
            display: none;
        }

        #dropZone {
            border: 2px dashed #c4b5fd;
            border-radius: var(--border-radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--accent-color);
            margin-bottom: 20px;
        }

        #dropZone:hover,
        #dropZone.dragover {
            border-color: var(--primary-color);
            background: #ede9fe;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        #dropZone i {
            font-size: 3em;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        #dropZone span {
            display: block;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        #dropZone small {
            color: var(--secondary-color);
        }

        #fileName {
            font-weight: 500;
            color: var(--primary-color);
            margin-top: 10px;
        }

        #info {
            margin: 15px 0;
            padding: 12px;
            border-radius: var(--border-radius);
            background: var(--accent-color);
            border-left: 4px solid var(--primary-color);
            font-weight: 500;
        }

        #info.success {
            background: #ecfdf5;
            border-color: var(--success-color);
            color: #166534;
        }

        #info.error {
            background: #fef2f2;
            border-color: var(--danger-color);
            color: #991b1b;
        }

        #pagesContainer {
            display: none;
            margin-top: 20px;
        }

        .pages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .page-item {
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius);
            padding: 10px;
            text-align: center;
            background: white;
            cursor: move;
            transition: all 0.2s;
            position: relative;
        }

        .page-item:hover {
            border-color: var(--primary-color);
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        .page-item.dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }

        .page-item canvas {
            width: 100%;
            height: auto;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
        }

        .page-number {
            margin-top: 8px;
            font-weight: 600;
            color: var(--secondary-color);
            font-size: 0.9em;
        }

        .page-item.drag-over {
            border-color: var(--primary-color);
            background: #f0f9ff;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        button:hover:not(:disabled) {
            background: #7c3aed;
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-group button {
            flex: 1;
            padding: 12px;
            font-size: 1em;
        }

        .instructions {
            background: #fffbeb;
            border-left: 4px solid #f59e0b;
            padding: 15px;
            border-radius: 0 var(--border-radius) var(--border-radius) 0;
            margin: 20px 0;
        }

        .instructions h3 {
            margin-bottom: 10px;
            color: #92400e;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .instructions ol {
            padding-left: 20px;
        }

        .instructions li {
            margin-bottom: 8px;
        }

        @media (max-width: 480px) {
            .content {
                padding: 20px;
            }

            header h1 {
                font-size: 1.5em;
            }

            .pages-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 15px;
            }

            .btn-group {
                flex-direction: column;
            }
        }
    </style>
    <script src="theme-init.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="premium-theme.css">
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-exchange-alt"></i> Rearrange PDF Pages</h1>
            <p>Easy to use app for moving pages in PDF files quickly and easily</p>
        </header>

        <div class="content">
            <label for="fileInput">
                <div id="dropZone">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Drop your PDF here or click to browse</span>
                    <small>Free Online - No limits - Secure</small>
                    <div id="fileName"></div>
                </div>
            </label>
            <input type="file" id="fileInput" accept=".pdf">

            <div id="info"></div>

            <div class="instructions">
                <h3><i class="fas fa-info-circle"></i> How to Use</h3>
                <ol>
                    <li>Upload a PDF file using the drop zone above</li>
                    <li>Drag and drop pages to rearrange their order</li>
                    <li>Click "Download Rearranged PDF" when finished</li>
                </ol>
            </div>

            <div id="pagesContainer">
                <h3>PDF Pages <span id="pageCount"></span></h3>
                <div class="pages-grid" id="pagesGrid"></div>
                
                <div class="btn-group">
                    <button id="downloadBtn" onclick="downloadRearrangedPDF()" disabled>
                        <i class="fas fa-download"></i> Download Rearranged PDF
                    </button>
                    <button onclick="resetAll()">
                        <i class="fas fa-redo"></i> Reset
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const info = document.getElementById('info');
        const fileNameDiv = document.getElementById('fileName');
        const pagesContainer = document.getElementById('pagesContainer');
        const pagesGrid = document.getElementById('pagesGrid');
        const pageCountSpan = document.getElementById('pageCount');
        const downloadBtn = document.getElementById('downloadBtn');

        let pdfDoc = null;
        let originalFile = null;
        let pageOrder = [];

        // Drag-drop events
        fileInput.addEventListener('change', loadFile);
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') {
                const dt = new DataTransfer();
                dt.items.add(file);
                fileInput.files = dt.files;
                loadFile({ target: fileInput });
            }
        });

        async function loadFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            dropZone.querySelector('span').textContent = 'Processing...';
            fileNameDiv.textContent = file.name;
            info.textContent = 'Loading PDF...';
            info.className = '';

            try {
                // Store the original file to avoid ArrayBuffer detachment issues
                originalFile = file;
                const arrayBuffer = await file.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument(arrayBuffer).promise;
                
                pageOrder = Array.from({ length: pdfDoc.numPages }, (_, i) => i + 1);
                
                info.innerHTML = `<i class="fas fa-check"></i> Loaded PDF with ${pdfDoc.numPages} pages!`;
                info.className = 'success';
                
                await renderPages();
            } catch (e) {
                info.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Couldn't load PDF: ${e.message}`;
                info.className = 'error';
                pdfDoc = null;
            } finally {
                dropZone.querySelector('span').textContent = 'Drop your PDF here or click to browse';
            }
        }

        async function renderPages() {
            if (!pdfDoc) return;

            pagesGrid.innerHTML = '';
            pageCountSpan.textContent = `(${pdfDoc.numPages} pages)`;
            pagesContainer.style.display = 'block';

            for (let i = 0; i < pdfDoc.numPages; i++) {
                const pageNum = i + 1;
                const page = await pdfDoc.getPage(pageNum);
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                const viewport = page.getViewport({ scale: 1.5 });
                
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                
                const renderContext = {
                    canvasContext: context,
                    viewport: viewport
                };
                
                await page.render(renderContext).promise;
                
                const pageItem = document.createElement('div');
                pageItem.className = 'page-item';
                pageItem.draggable = true;
                pageItem.dataset.pageNumber = pageNum;
                
                pageItem.innerHTML = `
                    <canvas></canvas>
                    <div class="page-number">Page ${pageNum}</div>
                `;
                
                // Copy canvas content
                const pageCanvas = pageItem.querySelector('canvas');
                pageCanvas.width = canvas.width;
                pageCanvas.height = canvas.height;
                pageCanvas.getContext('2d').drawImage(canvas, 0, 0);
                
                // Add drag events
                pageItem.addEventListener('dragstart', handleDragStart);
                pageItem.addEventListener('dragover', handleDragOver);
                pageItem.addEventListener('dragenter', handleDragEnter);
                pageItem.addEventListener('dragleave', handleDragLeave);
                pageItem.addEventListener('drop', handleDrop);
                pageItem.addEventListener('dragend', handleDragEnd);
                
                pagesGrid.appendChild(pageItem);
            }
            
            downloadBtn.disabled = false;
        }

        // Drag and drop functionality
        let draggedItem = null;

        function handleDragStart(e) {
            draggedItem = this;
            setTimeout(() => this.classList.add('dragging'), 0);
        }

        function handleDragOver(e) {
            e.preventDefault();
        }

        function handleDragEnter(e) {
            e.preventDefault();
            this.classList.add('drag-over');
        }

        function handleDragLeave() {
            this.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            
            if (draggedItem !== this) {
                const allItems = Array.from(pagesGrid.children);
                const draggedIndex = allItems.indexOf(draggedItem);
                const targetIndex = allItems.indexOf(this);
                
                if (draggedIndex < targetIndex) {
                    pagesGrid.insertBefore(draggedItem, this.nextSibling);
                } else {
                    pagesGrid.insertBefore(draggedItem, this);
                }
                
                // Update page order array
                updatePageOrder();
                
                info.innerHTML = '<i class="fas fa-check"></i> Page order updated! Drag more pages or download.';
                info.className = 'success';
            }
        }

        function handleDragEnd() {
            this.classList.remove('dragging');
            draggedItem = null;
        }

        function updatePageOrder() {
            const items = pagesGrid.querySelectorAll('.page-item');
            pageOrder = Array.from(items).map(item => parseInt(item.dataset.pageNumber));
        }

        async function downloadRearrangedPDF() {
            if (!originalFile || pageOrder.length === 0) {
                info.innerHTML = '<i class="fas fa-exclamation-triangle"></i> No PDF loaded!';
                info.className = 'error';
                return;
            }

            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating PDF...';
            info.textContent = 'Creating rearranged PDF...';
            info.className = '';

            try {
                // Create a fresh ArrayBuffer from the original file each time
                const arrayBuffer = await originalFile.arrayBuffer();
                
                // Use PDFLib directly without destructuring
                const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                
                // Create a new PDF document
                const newPdfDoc = await PDFLib.PDFDocument.create();
                
                // Copy pages in the new order
                for (const pageNumber of pageOrder) {
                    const [copiedPage] = await newPdfDoc.copyPages(pdfDoc, [pageNumber - 1]);
                    newPdfDoc.addPage(copiedPage);
                }
                
                // Save the new PDF
                const pdfBytes = await newPdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `rearranged_pdf_${Date.now()}.pdf`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                info.innerHTML = '<i class="fas fa-check-circle"></i> Success! PDF with rearranged pages downloaded!';
                info.className = 'success';
            } catch (e) {
                info.innerHTML = `<i class="fas fa-exclamation-triangle"></i> PDF creation failed: ${e.message}`;
                info.className = 'error';
                console.error('PDF creation error:', e); // Log error for debugging
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '<i class="fas fa-download"></i> Download Rearranged PDF';
            }
        }

        function resetAll() {
            fileInput.value = '';
            fileNameDiv.textContent = '';
            info.textContent = '';
            info.className = '';
            pagesContainer.style.display = 'none';
            pagesGrid.innerHTML = '';
            pdfDoc = null;
            originalFileArrayBuffer = null;
            pageOrder = [];
            downloadBtn.disabled = true;
            dropZone.querySelector('span').textContent = 'Drop your PDF here or click to browse';
        }
    </script>
    <script src="tool-registry.js"></script>
    <script src="premium-ui.js"></script>
</body>

</html>
