<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#2f4a76">
    <title>PDF Insights - Metadata and Stats</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --primary-color: #0f766e;
            --secondary-color: #475569;
            --accent-color: #ccfbf1;
            --success-color: #16a34a;
            --danger-color: #dc2626;
            --border-radius: 10px;
            --shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(140deg, #f0fdfa 0%, #ecfeff 100%);
            min-height: 100vh;
            padding: 20px;
            color: #0f172a;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.75em;
            margin-bottom: 6px;
        }

        header p {
            opacity: 0.95;
            font-size: 0.95em;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #ffffff;
            text-decoration: none;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: var(--border-radius);
            margin-bottom: 12px;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.28);
        }

        .content {
            padding: 24px;
        }

        input[type="file"] {
            display: none;
        }

        #dropZone {
            border: 2px dashed #5eead4;
            background: var(--accent-color);
            border-radius: var(--border-radius);
            padding: 34px 18px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-bottom: 20px;
        }

        #dropZone:hover,
        #dropZone.dragover {
            background: #99f6e4;
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        #dropZone i {
            font-size: 2.4em;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        #dropZone p {
            color: #0f172a;
            margin-bottom: 5px;
        }

        #dropZone small {
            color: var(--secondary-color);
        }

        .status {
            display: none;
            margin-bottom: 16px;
            padding: 12px;
            border-radius: var(--border-radius);
            font-weight: 600;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #dcfce7;
            color: #166534;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .status.loading {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 14px;
            margin-bottom: 18px;
        }

        .card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: var(--border-radius);
            padding: 14px;
        }

        .card h3 {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 1em;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 0.92em;
        }

        .stats-row span:first-child {
            color: var(--secondary-color);
        }

        .stats-row span:last-child {
            font-weight: 600;
            color: #0f172a;
            text-align: right;
        }

        .table-wrap {
            margin-top: 16px;
            overflow-x: auto;
            border: 1px solid #e2e8f0;
            border-radius: var(--border-radius);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 680px;
        }

        th,
        td {
            border-bottom: 1px solid #e2e8f0;
            padding: 10px 12px;
            text-align: left;
            font-size: 0.92em;
        }

        th {
            background: #ecfeff;
            color: #0f766e;
            font-weight: 700;
        }

        td {
            color: #0f172a;
        }

        .actions {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            border-radius: var(--border-radius);
            background: var(--primary-color);
            color: #ffffff;
            padding: 11px 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover:not(:disabled) {
            background: #115e59;
            transform: translateY(-1px);
        }

        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .muted {
            color: #64748b;
            font-size: 0.9em;
        }

        @media (max-width: 640px) {
            .content {
                padding: 18px;
            }

            header h1 {
                font-size: 1.45em;
            }
        }
    </style>
    <script src="theme-init.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="premium-theme.css">
</head>

<body>
    <div class="container">
        <header>
            <a href="index.html" class="back-button">
                <i class="fas fa-arrow-left"></i> Back to Tools
            </a>
            <h1><i class="fas fa-chart-line"></i> PDF Insights</h1>
            <p>Inspect metadata, page dimensions, and document statistics instantly.</p>
        </header>

        <div class="content">
            <label for="pdfFile">
                <div id="dropZone">
                    <i class="fas fa-file-circle-info"></i>
                    <p><strong>Click to upload</strong> or drag and drop a PDF file</p>
                    <small>Metadata and page analytics are generated locally in your browser</small>
                </div>
            </label>
            <input type="file" id="pdfFile" accept=".pdf,application/pdf">

            <div id="status" class="status"></div>

            <div id="reportSection" style="display:none;">
                <div class="cards">
                    <div class="card" id="fileCard">
                        <h3><i class="fas fa-file-pdf"></i> File Details</h3>
                    </div>
                    <div class="card" id="docCard">
                        <h3><i class="fas fa-layer-group"></i> Document Stats</h3>
                    </div>
                    <div class="card" id="metaCard">
                        <h3><i class="fas fa-tags"></i> Metadata</h3>
                    </div>
                </div>

                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Page</th>
                                <th>Width (pt)</th>
                                <th>Height (pt)</th>
                                <th>Orientation</th>
                                <th>Rotation</th>
                            </tr>
                        </thead>
                        <tbody id="pageTableBody"></tbody>
                    </table>
                </div>

                <p class="muted" id="tableCaption">Showing page metrics.</p>

                <div class="actions">
                    <button id="downloadJsonBtn" disabled>
                        <i class="fas fa-download"></i> Download JSON Report
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('pdfFile');
        const statusEl = document.getElementById('status');
        const reportSection = document.getElementById('reportSection');
        const fileCard = document.getElementById('fileCard');
        const docCard = document.getElementById('docCard');
        const metaCard = document.getElementById('metaCard');
        const pageTableBody = document.getElementById('pageTableBody');
        const tableCaption = document.getElementById('tableCaption');
        const downloadJsonBtn = document.getElementById('downloadJsonBtn');

        let latestReport = null;

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (event) => {
            event.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

        dropZone.addEventListener('drop', (event) => {
            event.preventDefault();
            dropZone.classList.remove('dragover');
            const file = event.dataTransfer.files[0];
            if (file) {
                processFile(file);
            }
        });

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                processFile(file);
            }
        });

        downloadJsonBtn.addEventListener('click', () => {
            if (!latestReport) return;

            const blob = new Blob([JSON.stringify(latestReport, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.download = `${latestReport.file.name.replace(/\.pdf$/i, '') || 'pdf'}_report.json`;
            document.body.appendChild(anchor);
            anchor.click();
            document.body.removeChild(anchor);
            URL.revokeObjectURL(url);
        });

        async function processFile(file) {
            if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
                showStatus('Please upload a valid PDF file.', 'error');
                return;
            }

            showStatus('Analyzing PDF... Please wait.', 'loading');
            reportSection.style.display = 'none';
            downloadJsonBtn.disabled = true;

            try {
                const arrayBuffer = await file.arrayBuffer();
                const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
                const pdf = await loadingTask.promise;
                const metadata = await readMetadata(pdf);
                const pageDetails = await readPageDetails(pdf);

                const portraitPages = pageDetails.filter((page) => page.orientation === 'Portrait').length;
                const landscapePages = pageDetails.length - portraitPages;

                latestReport = {
                    file: {
                        name: file.name,
                        sizeBytes: file.size,
                        sizeReadable: formatFileSize(file.size),
                        lastModified: new Date(file.lastModified).toISOString()
                    },
                    document: {
                        pageCount: pdf.numPages,
                        portraitPages,
                        landscapePages
                    },
                    metadata,
                    pages: pageDetails
                };

                renderReport(latestReport);
                showStatus('PDF analysis completed successfully.', 'success');
                reportSection.style.display = 'block';
                downloadJsonBtn.disabled = false;
            } catch (error) {
                console.error('Failed to analyze PDF:', error);
                showStatus('Could not read this PDF: ' + error.message, 'error');
            }
        }

        async function readMetadata(pdf) {
            try {
                const result = await pdf.getMetadata();
                const info = result.info || {};
                return {
                    title: info.Title || 'N/A',
                    author: info.Author || 'N/A',
                    subject: info.Subject || 'N/A',
                    keywords: info.Keywords || 'N/A',
                    creator: info.Creator || 'N/A',
                    producer: info.Producer || 'N/A',
                    creationDate: info.CreationDate || 'N/A',
                    modificationDate: info.ModDate || 'N/A'
                };
            } catch (error) {
                return {
                    title: 'N/A',
                    author: 'N/A',
                    subject: 'N/A',
                    keywords: 'N/A',
                    creator: 'N/A',
                    producer: 'N/A',
                    creationDate: 'N/A',
                    modificationDate: 'N/A'
                };
            }
        }

        async function readPageDetails(pdf) {
            const details = [];
            for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {
                const page = await pdf.getPage(pageNumber);
                const viewport = page.getViewport({ scale: 1 });
                details.push({
                    page: pageNumber,
                    width: Number(viewport.width.toFixed(2)),
                    height: Number(viewport.height.toFixed(2)),
                    orientation: viewport.width >= viewport.height ? 'Landscape' : 'Portrait',
                    rotation: page.rotate || 0
                });
            }
            return details;
        }

        function renderReport(report) {
            fileCard.innerHTML = `
                <h3><i class="fas fa-file-pdf"></i> File Details</h3>
                ${statsRow('Name', report.file.name)}
                ${statsRow('Size', report.file.sizeReadable)}
                ${statsRow('Updated', new Date(report.file.lastModified).toLocaleString())}
            `;

            docCard.innerHTML = `
                <h3><i class="fas fa-layer-group"></i> Document Stats</h3>
                ${statsRow('Total Pages', report.document.pageCount)}
                ${statsRow('Portrait Pages', report.document.portraitPages)}
                ${statsRow('Landscape Pages', report.document.landscapePages)}
            `;

            metaCard.innerHTML = `
                <h3><i class="fas fa-tags"></i> Metadata</h3>
                ${statsRow('Title', report.metadata.title)}
                ${statsRow('Author', report.metadata.author)}
                ${statsRow('Subject', report.metadata.subject)}
                ${statsRow('Creator', report.metadata.creator)}
            `;

            const rows = report.pages.map((page) => `
                <tr>
                    <td>${page.page}</td>
                    <td>${page.width}</td>
                    <td>${page.height}</td>
                    <td>${page.orientation}</td>
                    <td>${page.rotation}°</td>
                </tr>
            `).join('');

            pageTableBody.innerHTML = rows;
            tableCaption.textContent = `Showing ${report.pages.length} page metrics.`;
        }

        function statsRow(label, value) {
            return `<div class="stats-row"><span>${label}</span><span>${escapeHtml(String(value))}</span></div>`;
        }

        function showStatus(message, type) {
            statusEl.textContent = message;
            statusEl.className = `status show ${type}`;
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const units = ['Bytes', 'KB', 'MB', 'GB'];
            const index = Math.floor(Math.log(bytes) / Math.log(1024));
            const value = bytes / Math.pow(1024, index);
            return `${value.toFixed(index === 0 ? 0 : 2)} ${units[index]}`;
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
    </script>
    <script src="tool-registry.js"></script>
    <script src="premium-ui.js"></script>
</body>

</html>
