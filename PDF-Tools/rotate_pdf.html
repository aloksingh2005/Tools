<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#2f4a76">
    <title>PDF Rotator (JS Edition)</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --primary-color: #8b5cf6;
            --secondary-color: #64748b;
            --accent-color: #f3e8ff;
            --success-color: #10b981;
            --danger-color: #dc2626;
            --border-radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f3e8ff 0%, #e0e7ff 100%);
            min-height: 100vh;
            padding: 20px;
            color: #3730a3;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .content {
            padding: 30px;
        }

        label {
            display: block;
            font-weight: 600;
            margin: 15px 0 8px;
            color: var(--secondary-color);
            font-size: 0.95em;
        }

        input[type="file"] {
            display: none;
        }

        #dropZone {
            border: 2px dashed #c4b5fd;
            border-radius: var(--border-radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--accent-color);
            margin-bottom: 20px;
        }

        #dropZone:hover,
        #dropZone.dragover {
            border-color: var(--primary-color);
            background: #ede9fe;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        #dropZone i {
            font-size: 3em;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        #dropZone span {
            display: block;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        #dropZone small {
            color: var(--secondary-color);
        }

        #fileName {
            font-weight: 500;
            color: var(--primary-color);
            margin-top: 10px;
        }

        #info {
            margin: 15px 0;
            padding: 12px;
            border-radius: var(--border-radius);
            background: var(--accent-color);
            border-left: 4px solid var(--primary-color);
            font-weight: 500;
        }

        #info.success {
            background: #ecfdf5;
            border-color: var(--success-color);
            color: #166534;
        }

        #info.error {
            background: #fef2f2;
            border-color: var(--danger-color);
            color: #991b1b;
        }

        select,
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: var(--border-radius);
            font-size: 1em;
            transition: border-color 0.3s;
        }

        select:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .angle-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .angle-group button {
            flex: 1;
            padding: 10px;
            background: #f3f4f6;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .angle-group button.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        button:hover:not(:disabled) {
            background: #7c3aed;
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        @media (max-width: 480px) {
            .content {
                padding: 20px;
            }

            header h1 {
                font-size: 1.5em;
            }

            .angle-group {
                flex-direction: column;
            }
        }
    </style>
    <script src="theme-init.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="premium-theme.css">
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-sync-alt"></i> PDF Rotator</h1>
            <p>Rotate PDF pages by 90°, 180°, or 270° and download instantly.</p>
        </header>
        <div class="content">
            <label for="fileInput">
                <div id="dropZone">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Drop your PDF here or click to browse</span>
                    <small>Rotate any or all pages in seconds.</small>
                    <div id="fileName"></div>
                </div>
            </label>
            <input type="file" id="fileInput" accept=".pdf">

            <div id="info"></div>

            <label>Pages to Rotate: (e.g., all, 1-5,10)</label>
            <input type="text" id="pageRange" placeholder="all">

            <label>Rotation Angle:</label>
            <div class="angle-group">
                <button class="active" data-angle="90">90°</button>
                <button data-angle="180">180°</button>
                <button data-angle="270">270°</button>
            </div>

            <label>Output: (Downloads 'rotated_*.pdf')</label>
            <input type="text" placeholder="Auto-downloads to Downloads" disabled>

            <button id="rotateBtn" onclick="rotatePDF()" disabled>
                <i class="fas fa-redo"></i> Rotate PDF
            </button>
        </div>
    </div>
    <script>
        const { PDFDocument, degrees } = PDFLib;
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const info = document.getElementById('info');
        const rotateBtn = document.getElementById('rotateBtn');
        const pageRangeInput = document.getElementById('pageRange');
        const angleBtns = document.querySelectorAll('.angle-group button');
        const fileNameDiv = document.getElementById('fileName');
        let pdfDoc, totalPages;
        let selectedAngle = 90;

        fileInput.addEventListener('change', loadFile);
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') {
                const dt = new DataTransfer(); dt.items.add(file); fileInput.files = dt.files; loadFile({ target: fileInput });
            }
        });
        dropZone.addEventListener('click', () => fileInput.click());

        angleBtns.forEach(btn => btn.addEventListener('click', () => {
            angleBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active');
            selectedAngle = parseInt(btn.dataset.angle);
        }));

        async function loadFile(event) {
            const file = event.target.files[0]; if (!file) return;
            dropZone.querySelector('span').textContent = 'Processing...'; fileNameDiv.textContent = file.name;
            info.textContent = 'Loading PDF...'; info.className = '';
            try {
                const arrayBuffer = await file.arrayBuffer();
                pdfDoc = await PDFDocument.load(arrayBuffer);
                totalPages = pdfDoc.getPageCount();
                info.innerHTML = `<i class="fas fa-check"></i> Loaded: ${totalPages} pages ready to rotate!`;
                info.className = 'success'; rotateBtn.disabled = false; pageRangeInput.value = 'all';
            } catch (e) {
                info.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Couldn't load PDF: ${e.message}`; info.className = 'error'; rotateBtn.disabled = true;
            }
        }

        function parseRange(rangeStr, total) {
            if (rangeStr.trim() === 'all') return Array.from({ length: total }, (_, i) => i);
            const pages = new Set();
            const parts = rangeStr.split(/,(?![^-])/).map(p => p.trim()).filter(Boolean);
            for (let part of parts) {
                if (part.includes('-')) {
                    const [startStr, endStr] = part.split('-');
                    const start = parseInt(startStr) || 1;
                    const end = parseInt(endStr) || total;
                    for (let i = start - 1; i < end; i++) if (i >= 0 && i < total) pages.add(i);
                } else {
                    const page = parseInt(part) - 1;
                    if (page >= 0 && page < total) pages.add(page);
                }
            }
            return Array.from(pages).sort((a, b) => a - b);
        }

        async function rotatePDF() {
            if (!pdfDoc) { info.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Select a PDF first!'; info.className = 'error'; return; }
            const rangeStr = pageRangeInput.value.trim();
            let pageIndices = parseRange(rangeStr || 'all', totalPages);
            if (pageIndices.length === 0) { info.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Invalid range!'; info.className = 'error'; return; }

            rotateBtn.disabled = true; rotateBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Rotating...'; info.textContent = 'Rotating pages...';
            try {
                const pages = pdfDoc.getPages();
                pageIndices.forEach(idx => {
                    const rotation = pages[idx].getRotation().angle + selectedAngle;
                    pages[idx].setRotation(degrees(rotation % 360));
                });
                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `rotated_${Date.now()}.pdf`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                info.innerHTML = `<i class="fas fa-check-circle"></i> Success! Rotated ${pageIndices.length} pages. Downloaded!`;
                info.className = 'success';
            } catch (e) {
                info.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Rotation failed: ${e.message}`; info.className = 'error';
            } finally {
                rotateBtn.disabled = false; rotateBtn.innerHTML = '<i class="fas fa-redo"></i> Rotate PDF';
            }
        }
        rotateBtn.disabled = true;
    </script>
    <script src="tool-registry.js"></script>
    <script src="premium-ui.js"></script>
</body>

</html>
