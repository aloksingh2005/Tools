<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#2f4a76">
    <title>PDF Preview Remover (JS - Fixed!)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #dc2626;
            --success: #16a34a;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .content {
            padding: 30px;
        }

        #dropZone {
            border: 2px dashed #ccc;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        #dropZone:hover {
            border-color: var(--primary);
            background: #eff6ff;
        }

        #dropZone.dragover {
            border-color: var(--primary);
            background: #eff6ff;
        }

        #info {
            padding: 12px;
            border-radius: 4px;
            margin: 10px 0;
        }

        .success {
            background: #d1fae5;
            color: var(--success);
        }

        .error {
            background: #fee2e2;
            color: #dc2626;
        }

        #previewContainer {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #e5e7eb;
            padding: 10px;
            border-radius: 4px;
        }

        .page-preview {
            text-align: center;
            border: 1px solid #f3f4f6;
            padding: 10px;
            border-radius: 4px;
        }

        .page-canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid #d1d5db;
        }

        .checkbox-row {
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background: #b91c1c;
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        input[type="file"] {
            display: none;
        }
    </style>
    <script src="theme-init.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="premium-theme.css">
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-eye"></i> PDF Preview Remover</h1>
            <p>Load PDF, preview pages, check to delete, remove & download!</p>
        </header>
        <div class="content">
            <div id="dropZone">
                <i class="fas fa-cloud-upload-alt" style="font-size: 3em; color: var(--primary);"></i>
                <p>Drop PDF here or click to browse</p>
            </div>
            <input type="file" id="fileInput" accept=".pdf">
            <div id="info"></div>
            <div id="previewContainer"></div>
            <div>
                <label>Output: (Auto-downloads to your Downloads folder)</label>
                <input type="text" id="outputFolder" placeholder="Browser auto-save" disabled>
            </div>
            <button id="removeBtn" onclick="removeSelected()" disabled><i class="fas fa-scissors"></i> Remove Selected &
                Download</button>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const info = document.getElementById('info');
        const previewContainer = document.getElementById('previewContainer');
        const removeBtn = document.getElementById('removeBtn');
        let pdfDoc = null;
        let pageCheckboxes = [];  // {pageNum, checkbox}

        // Events
        fileInput.addEventListener('change', loadPDF);
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') {
                fileInput.files = [file];
                loadPDF({ target: fileInput });
            }
        });

        async function loadPDF(event) {
            const file = event.target.files[0];
            if (!file) return;
            dropZone.innerHTML = `<p>Loading ${file.name}...</p>`;
            info.textContent = 'Loading PDF...';
            info.className = '';

            try {
                const arrayBuffer = await file.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument(arrayBuffer).promise;
                previewContainer.innerHTML = '';
                pageCheckboxes = [];
                await renderThumbnails();
                info.innerHTML = `<i class="fas fa-check"></i> Loaded ${pdfDoc.numPages} pages! Select to delete.`;
                info.className = 'success';
                removeBtn.disabled = false;
            } catch (e) {
                info.innerHTML = `<i class="fas fa-exclamation"></i> Error: ${e.message}`;
                info.className = 'error';
            }
        }

        async function renderThumbnails() {
            for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
                const page = await pdfDoc.getPage(pageNum);
                const scale = 0.5;  // Thumbnail scale
                const viewport = page.getViewport({ scale });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                canvas.className = 'page-canvas';

                await page.render({ canvasContext: context, viewport }).promise;

                const div = document.createElement('div');
                div.className = 'page-preview';
                div.innerHTML = `
                    <canvas></canvas>
                    <div class="checkbox-row">
                        <label><input type="checkbox" data-page="${pageNum}"> Delete Page ${pageNum}</label>
                    </div>
                `;
                div.querySelector('canvas').replaceWith(canvas);

                const checkbox = div.querySelector('input[type="checkbox"]');
                checkbox.addEventListener('change', (e) => togglePage(e.target.dataset.page, e.target.checked));
                pageCheckboxes.push({ pageNum: pageNum, checkbox: checkbox });

                previewContainer.appendChild(div);
            }
        }

        function togglePage(pageNum, checked) {
            // Just for tracking – collect on remove
        }

        async function removeSelected() {
            const selected = Array.from(pageCheckboxes)
                .filter(item => item.checkbox.checked)
                .map(item => parseInt(item.pageNum));

            if (selected.length === 0) {
                alert('Select pages to remove!');
                return;
            }

            removeBtn.disabled = true;
            removeBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            info.textContent = 'Removing pages...';

            try {
                const { PDFDocument } = PDFLib;
                const pdfBytes = await (await pdfDoc.getData()).buffer;  // Get original bytes
                let libDoc = await PDFDocument.load(pdfBytes);

                // Remove selected pages (reverse order to avoid index shift)
                selected.sort((a, b) => b - a).forEach(p => {
                    libDoc.removePage(p - 1);  // 0-based
                });

                const finalBytes = await libDoc.save();
                const blob = new Blob([finalBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `preview_removed_${new Date().getTime()}.pdf`;  // Unique name
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                info.innerHTML = `<i class="fas fa-check"></i> Removed ${selected.length} pages! Downloaded successfully.`;
                info.className = 'success';
            } catch (e) {
                info.innerHTML = `<i class="fas fa-exclamation"></i> Error: ${e.message}`;
                info.className = 'error';
            } finally {
                removeBtn.disabled = false;
                removeBtn.innerHTML = '<i class="fas fa-scissors"></i> Remove Selected & Download';
            }
        }
    </script>
    <script src="tool-registry.js"></script>
    <script src="premium-ui.js"></script>
</body>

</html>
