<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#2f4a76">
    <title>Edit PDF Metadata</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --primary-color: #7c3aed;
            --secondary-color: #64748b;
            --accent-color: #ede9fe;
            --success-color: #10b981;
            --danger-color: #dc2626;
            --border-radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%);
            min-height: 100vh;
            padding: 20px;
            color: #5b21b6;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .content {
            padding: 30px;
        }

        label {
            display: block;
            font-weight: 600;
            margin: 15px 0 8px;
            color: var(--secondary-color);
            font-size: 0.95em;
        }

        input[type="file"] {
            display: none;
        }

        #dropZone {
            border: 2px dashed #c4b5fd;
            border-radius: var(--border-radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--accent-color);
            margin-bottom: 20px;
        }

        #dropZone:hover,
        #dropZone.dragover {
            border-color: var(--primary-color);
            background: #f5f3ff;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        #dropZone i {
            font-size: 3em;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        #dropZone p {
            margin: 10px 0;
            color: var(--secondary-color);
        }

        #dropZone .highlight {
            color: var(--primary-color);
            font-weight: 600;
        }

        #fileInfo {
            padding: 12px;
            background: #f1f5f9;
            border-radius: var(--border-radius);
            margin: 15px 0;
            display: none;
        }

        #fileInfo.show {
            display: block;
        }

        #fileInfo p {
            margin: 5px 0;
            color: var(--secondary-color);
        }

        .metadata-section {
            background: #f8fafc;
            padding: 20px;
            border-radius: var(--border-radius);
            margin: 20px 0;
            display: none;
        }

        .metadata-section.show {
            display: block;
        }

        .input-group {
            margin: 15px 0;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius);
            font-size: 1em;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .input-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .current-value {
            font-size: 0.85em;
            color: var(--secondary-color);
            margin-top: 5px;
            padding: 8px;
            background: #f1f5f9;
            border-radius: 4px;
        }

        .metadata-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        button:hover {
            background: #6d28d9;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }

        #status {
            padding: 12px;
            border-radius: var(--border-radius);
            margin: 15px 0;
            text-align: center;
            display: none;
        }

        #status.show {
            display: block;
        }

        #status.success {
            background: #d1fae5;
            color: var(--success-color);
        }

        #status.error {
            background: #fee2e2;
            color: var(--danger-color);
        }

        #status.loading {
            background: #e0f2fe;
            color: #0284c7;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: var(--border-radius);
            transition: background 0.3s;
            margin-bottom: 10px;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .info-box {
            background: #dbeafe;
            border-left: 4px solid #2563eb;
            padding: 12px;
            margin: 15px 0;
            border-radius: 4px;
        }

        .info-box p {
            color: #1e40af;
            font-size: 0.9em;
            margin: 0;
        }

        @media (max-width: 600px) {
            .metadata-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="theme-init.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="premium-theme.css">
</head>

<body>
    <div class="container">
        <header>
            <a href="index.html" class="back-button">
                <i class="fas fa-arrow-left"></i> Back to Tools
            </a>
            <h1><i class="fas fa-info-circle"></i> Edit PDF Metadata</h1>
            <p>Edit document properties and information</p>
        </header>

        <div class="content">
            <div class="info-box">
                <p><i class="fas fa-lightbulb"></i> You can view and edit PDF metadata including title, author, subject, keywords, and more.</p>
            </div>

            <label for="pdfFile">
                <i class="fas fa-file-pdf"></i> Select PDF File
            </label>
            <div id="dropZone">
                <i class="fas fa-cloud-upload-alt"></i>
                <p><span class="highlight">Click to upload</span> or drag and drop</p>
                <p style="font-size: 0.9em;">Only PDF files are accepted</p>
            </div>
            <input type="file" id="pdfFile" accept=".pdf">

            <div id="fileInfo">
                <p><strong>Selected File:</strong> <span id="fileName"></span></p>
                <p><strong>Size:</strong> <span id="fileSize"></span></p>
            </div>

            <div id="status"></div>

            <div class="metadata-section" id="metadataSection">
                <h3 style="margin-bottom: 15px; color: var(--primary-color);">
                    <i class="fas fa-database"></i> Document Metadata
                </h3>

                <div class="input-group">
                    <label>Title</label>
                    <input type="text" id="title" placeholder="Enter document title">
                    <div class="current-value" id="currentTitle"></div>
                </div>

                <div class="input-group">
                    <label>Author</label>
                    <input type="text" id="author" placeholder="Enter author name">
                    <div class="current-value" id="currentAuthor"></div>
                </div>

                <div class="input-group">
                    <label>Subject</label>
                    <input type="text" id="subject" placeholder="Enter document subject">
                    <div class="current-value" id="currentSubject"></div>
                </div>

                <div class="input-group">
                    <label>Keywords</label>
                    <input type="text" id="keywords" placeholder="Enter keywords (comma-separated)">
                    <div class="current-value" id="currentKeywords"></div>
                </div>

                <div class="input-group">
                    <label>Creator/Producer</label>
                    <input type="text" id="creator" placeholder="Enter creator application">
                    <div class="current-value" id="currentCreator"></div>
                </div>

                <div class="metadata-grid">
                    <div class="input-group">
                        <label>Creation Date</label>
                        <input type="date" id="creationDate">
                        <div class="current-value" id="currentCreationDate"></div>
                    </div>

                    <div class="input-group">
                        <label>Modification Date</label>
                        <input type="date" id="modificationDate">
                        <div class="current-value" id="currentModDate"></div>
                    </div>
                </div>
            </div>

            <button id="saveBtn" disabled>
                <i class="fas fa-save"></i>
                Save Metadata
            </button>
        </div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;

        let selectedFile = null;
        let pdfDoc = null;
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('pdfFile');
        const fileInfo = document.getElementById('fileInfo');
        const saveBtn = document.getElementById('saveBtn');
        const status = document.getElementById('status');
        const metadataSection = document.getElementById('metadataSection');

        // Drag and drop handlers
        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type === 'application/pdf') {
                handleFileSelection(files[0]);
            } else {
                showStatus('Please drop a valid PDF file', 'error');
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelection(e.target.files[0]);
            }
        });

        async function handleFileSelection(file) {
            selectedFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatFileSize(file.size);
            fileInfo.classList.add('show');

            try {
                showStatus('Loading PDF metadata...', 'loading');
                const arrayBuffer = await file.arrayBuffer();
                pdfDoc = await PDFDocument.load(arrayBuffer);

                // Extract current metadata
                const title = pdfDoc.getTitle() || '';
                const author = pdfDoc.getAuthor() || '';
                const subject = pdfDoc.getSubject() || '';
                const keywords = pdfDoc.getKeywords() || '';
                const creator = pdfDoc.getCreator() || '';
                const producer = pdfDoc.getProducer() || '';
                const creationDate = pdfDoc.getCreationDate();
                const modDate = pdfDoc.getModificationDate();

                // Populate form with current values
                document.getElementById('title').value = title;
                document.getElementById('author').value = author;
                document.getElementById('subject').value = subject;
                document.getElementById('keywords').value = keywords;
                document.getElementById('creator').value = creator || producer;

                if (creationDate) {
                    document.getElementById('creationDate').value = formatDateForInput(creationDate);
                }
                if (modDate) {
                    document.getElementById('modificationDate').value = formatDateForInput(modDate);
                }

                // Show current values
                document.getElementById('currentTitle').textContent = title ? `Current: ${title}` : 'Current: (none)';
                document.getElementById('currentAuthor').textContent = author ? `Current: ${author}` : 'Current: (none)';
                document.getElementById('currentSubject').textContent = subject ? `Current: ${subject}` : 'Current: (none)';
                document.getElementById('currentKeywords').textContent = keywords ? `Current: ${keywords}` : 'Current: (none)';
                document.getElementById('currentCreator').textContent = (creator || producer) ? `Current: ${creator || producer}` : 'Current: (none)';
                document.getElementById('currentCreationDate').textContent = creationDate ? `Current: ${formatDateReadable(creationDate)}` : 'Current: (none)';
                document.getElementById('currentModDate').textContent = modDate ? `Current: ${formatDateReadable(modDate)}` : 'Current: (none)';

                metadataSection.classList.add('show');
                saveBtn.disabled = false;
                showStatus('✓ PDF loaded successfully. Edit metadata below.', 'success');

            } catch (error) {
                console.error('Error loading PDF:', error);
                showStatus('Error loading PDF: ' + error.message, 'error');
            }
        }

        saveBtn.addEventListener('click', saveMetadata);

        async function saveMetadata() {
            if (!pdfDoc) {
                showStatus('Please select a PDF file first', 'error');
                return;
            }

            try {
                showStatus('Saving metadata... Please wait', 'loading');
                saveBtn.disabled = true;

                // Set metadata
                const title = document.getElementById('title').value.trim();
                const author = document.getElementById('author').value.trim();
                const subject = document.getElementById('subject').value.trim();
                const keywords = document.getElementById('keywords').value.trim();
                const creator = document.getElementById('creator').value.trim();
                const creationDate = document.getElementById('creationDate').value;
                const modDate = document.getElementById('modificationDate').value;

                if (title) pdfDoc.setTitle(title);
                if (author) pdfDoc.setAuthor(author);
                if (subject) pdfDoc.setSubject(subject);
                if (keywords) pdfDoc.setKeywords(keywords.split(',').map(k => k.trim()));
                if (creator) {
                    pdfDoc.setCreator(creator);
                    pdfDoc.setProducer(creator);
                }
                
                if (creationDate) {
                    pdfDoc.setCreationDate(new Date(creationDate));
                }
                if (modDate) {
                    pdfDoc.setModificationDate(new Date(modDate));
                }

                // Save PDF
                const pdfBytes = await pdfDoc.save();

                // Download
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = selectedFile.name.replace('.pdf', '_metadata.pdf');
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                showStatus('✓ Metadata saved and downloaded successfully!', 'success');

            } catch (error) {
                console.error('Error saving metadata:', error);
                showStatus('Error: ' + error.message, 'error');
            } finally {
                saveBtn.disabled = false;
            }
        }

        function formatDateForInput(date) {
            const d = new Date(date);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatDateReadable(date) {
            return new Date(date).toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `show ${type}`;
            
            if (type === 'success') {
                setTimeout(() => {
                    status.classList.remove('show');
                }, 5000);
            }
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }
    </script>
    <script src="tool-registry.js"></script>
    <script src="premium-ui.js"></script>
</body>

</html>
