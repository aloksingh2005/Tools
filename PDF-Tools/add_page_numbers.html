<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#2f4a76">
    <title>Add Page Numbers to PDF</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --primary-color: #ea580c;
            --secondary-color: #64748b;
            --accent-color: #fed7aa;
            --success-color: #10b981;
            --danger-color: #dc2626;
            --border-radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fed7aa 0%, #fdba74 100%);
            min-height: 100vh;
            padding: 20px;
            color: #7c2d12;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .content {
            padding: 30px;
        }

        label {
            display: block;
            font-weight: 600;
            margin: 15px 0 8px;
            color: var(--secondary-color);
            font-size: 0.95em;
        }

        input[type="file"] {
            display: none;
        }

        #dropZone {
            border: 2px dashed #fdba74;
            border-radius: var(--border-radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--accent-color);
            margin-bottom: 20px;
        }

        #dropZone:hover,
        #dropZone.dragover {
            border-color: var(--primary-color);
            background: #ffedd5;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        #dropZone i {
            font-size: 3em;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        #dropZone p {
            margin: 10px 0;
            color: var(--secondary-color);
        }

        #dropZone .highlight {
            color: var(--primary-color);
            font-weight: 600;
        }

        .options-section {
            background: #f8fafc;
            padding: 20px;
            border-radius: var(--border-radius);
            margin: 20px 0;
            display: none;
        }

        .options-section.show {
            display: block;
        }

        .option-group {
            margin: 20px 0;
        }

        .position-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 10px 0;
        }

        .position-option {
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius);
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            background: white;
        }

        .position-option:hover {
            border-color: var(--primary-color);
        }

        .position-option.active {
            border-color: var(--primary-color);
            background: var(--accent-color);
        }

        .position-option i {
            display: block;
            font-size: 1.2em;
            margin-bottom: 5px;
            color: var(--primary-color);
        }

        .format-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px 0;
        }

        .format-btn {
            padding: 10px 20px;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius);
            cursor: pointer;
            background: white;
            transition: all 0.3s;
        }

        .format-btn:hover {
            border-color: var(--primary-color);
        }

        .format-btn.active {
            border-color: var(--primary-color);
            background: var(--accent-color);
        }

        .size-control {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 10px 0;
        }

        .size-control input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: #e2e8f0;
            outline: none;
        }

        .size-control input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
        }

        .size-value {
            min-width: 50px;
            text-align: right;
            font-weight: 600;
            color: var(--primary-color);
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius);
            font-size: 1em;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        button:hover {
            background: #c2410c;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }

        #status {
            padding: 12px;
            border-radius: var(--border-radius);
            margin: 15px 0;
            text-align: center;
            display: none;
        }

        #status.show {
            display: block;
        }

        #status.success {
            background: #d1fae5;
            color: var(--success-color);
        }

        #status.error {
            background: #fee2e2;
            color: var(--danger-color);
        }

        #status.loading {
            background: #e0f2fe;
            color: #0284c7;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: var(--border-radius);
            transition: background 0.3s;
            margin-bottom: 10px;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .preview-box {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius);
            padding: 20px;
            margin: 15px 0;
            text-align: center;
        }

        .preview-text {
            font-size: 1.2em;
            color: var(--secondary-color);
            margin: 10px 0;
        }
    </style>
    <script src="theme-init.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="premium-theme.css">
</head>

<body>
    <div class="container">
        <header>
            <a href="index.html" class="back-button">
                <i class="fas fa-arrow-left"></i> Back to Tools
            </a>
            <h1><i class="fas fa-hashtag"></i> Add Page Numbers</h1>
            <p>Add page numbering to your PDF documents</p>
        </header>

        <div class="content">
            <label for="pdfFile">
                <i class="fas fa-file-pdf"></i> Select PDF File
            </label>
            <div id="dropZone">
                <i class="fas fa-cloud-upload-alt"></i>
                <p><span class="highlight">Click to upload</span> or drag and drop</p>
                <p style="font-size: 0.9em;">Only PDF files are accepted</p>
            </div>
            <input type="file" id="pdfFile" accept=".pdf">

            <div id="status"></div>

            <div class="options-section" id="optionsSection">
                <h3 style="margin-bottom: 15px; color: var(--primary-color);">
                    <i class="fas fa-cog"></i> Page Number Settings
                </h3>

                <div class="option-group">
                    <label>Position</label>
                    <div class="position-grid">
                        <div class="position-option" data-position="top-left">
                            <i class="fas fa-arrow-up"></i>
                            <span>Top Left</span>
                        </div>
                        <div class="position-option" data-position="top-center">
                            <i class="fas fa-arrow-up"></i>
                            <span>Top Center</span>
                        </div>
                        <div class="position-option" data-position="top-right">
                            <i class="fas fa-arrow-up"></i>
                            <span>Top Right</span>
                        </div>
                        <div class="position-option" data-position="bottom-left">
                            <i class="fas fa-arrow-down"></i>
                            <span>Bottom Left</span>
                        </div>
                        <div class="position-option active" data-position="bottom-center">
                            <i class="fas fa-arrow-down"></i>
                            <span>Bottom Center</span>
                        </div>
                        <div class="position-option" data-position="bottom-right">
                            <i class="fas fa-arrow-down"></i>
                            <span>Bottom Right</span>
                        </div>
                    </div>
                </div>

                <div class="option-group">
                    <label>Format</label>
                    <div class="format-options">
                        <div class="format-btn active" data-format="{n}">Page {n}</div>
                        <div class="format-btn" data-format="{n} of {total}">{n} of {total}</div>
                        <div class="format-btn" data-format="Page {n} / {total}">Page {n} / {total}</div>
                        <div class="format-btn" data-format="{n}">{n}</div>
                    </div>
                </div>

                <div class="option-group">
                    <label>Font Size</label>
                    <div class="size-control">
                        <input type="range" id="fontSize" min="8" max="24" value="12">
                        <span class="size-value"><span id="fontSizeValue">12</span>pt</span>
                    </div>
                </div>

                <div class="option-group">
                    <label>Start From Page</label>
                    <input type="number" id="startPage" min="1" value="1">
                </div>

                <div class="preview-box">
                    <strong>Preview:</strong>
                    <div class="preview-text" id="previewText">Page 1</div>
                </div>

                <button id="addNumbersBtn">
                    <i class="fas fa-plus-circle"></i>
                    Add Page Numbers
                </button>
            </div>
        </div>
    </div>

    <script>
        const { PDFDocument, rgb, StandardFonts } = PDFLib;

        let selectedFile = null;
        let position = 'bottom-center';
        let format = '{n}';
        let fontSize = 12;
        let startFrom = 1;
        let totalPages = 0;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('pdfFile');
        const status = document.getElementById('status');
        const optionsSection = document.getElementById('optionsSection');

        // Drag and drop handlers
        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type === 'application/pdf') {
                handleFileSelection(files[0]);
            } else {
                showStatus('Please drop a valid PDF file', 'error');
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelection(e.target.files[0]);
            }
        });

        async function handleFileSelection(file) {
            selectedFile = file;
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdfDoc = await PDFDocument.load(arrayBuffer);
                totalPages = pdfDoc.getPageCount();
                
                showStatus(`PDF loaded: ${totalPages} page(s). Configure settings below.`, 'success');
                optionsSection.classList.add('show');
                updatePreview();
            } catch (error) {
                showStatus('Error loading PDF: ' + error.message, 'error');
            }
        }

        // Position selection
        document.querySelectorAll('.position-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.position-option').forEach(o => o.classList.remove('active'));
                this.classList.add('active');
                position = this.dataset.position;
                updatePreview();
            });
        });

        // Format selection
        document.querySelectorAll('.format-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                format = this.dataset.format;
                updatePreview();
            });
        });

        // Font size
        document.getElementById('fontSize').addEventListener('input', function() {
            fontSize = parseInt(this.value);
            document.getElementById('fontSizeValue').textContent = fontSize;
            updatePreview();
        });

        // Start page
        document.getElementById('startPage').addEventListener('input', function() {
            startFrom = parseInt(this.value) || 1;
            updatePreview();
        });

        function updatePreview() {
            let previewText = format.replace('{n}', startFrom).replace('{total}', totalPages);
            document.getElementById('previewText').textContent = previewText;
            document.getElementById('previewText').style.fontSize = fontSize + 'px';
        }

        // Add page numbers
        document.getElementById('addNumbersBtn').addEventListener('click', addPageNumbers);

        async function addPageNumbers() {
            if (!selectedFile) {
                showStatus('Please select a PDF file first', 'error');
                return;
            }

            try {
                showStatus('Adding page numbers... Please wait', 'loading');
                document.getElementById('addNumbersBtn').disabled = true;

                const arrayBuffer = await selectedFile.arrayBuffer();
                const pdfDoc = await PDFDocument.load(arrayBuffer);
                const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
                const pages = pdfDoc.getPages();

                pages.forEach((page, index) => {
                    if (index + 1 < startFrom) return;

                    const { width, height } = page.getSize();
                    const pageNumber = index + 1;
                    const text = format.replace('{n}', pageNumber).replace('{total}', totalPages);
                    const textWidth = font.widthOfTextAtSize(text, fontSize);

                    let x, y;

                    // Calculate position
                    switch (position) {
                        case 'top-left':
                            x = 50;
                            y = height - 30;
                            break;
                        case 'top-center':
                            x = (width - textWidth) / 2;
                            y = height - 30;
                            break;
                        case 'top-right':
                            x = width - textWidth - 50;
                            y = height - 30;
                            break;
                        case 'bottom-left':
                            x = 50;
                            y = 30;
                            break;
                        case 'bottom-center':
                            x = (width - textWidth) / 2;
                            y = 30;
                            break;
                        case 'bottom-right':
                            x = width - textWidth - 50;
                            y = 30;
                            break;
                    }

                    page.drawText(text, {
                        x: x,
                        y: y,
                        size: fontSize,
                        font: font,
                        color: rgb(0, 0, 0),
                    });
                });

                const pdfBytes = await pdfDoc.save();

                // Download
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = selectedFile.name.replace('.pdf', '_numbered.pdf');
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                showStatus('✓ Page numbers added successfully!', 'success');

            } catch (error) {
                console.error('Error adding page numbers:', error);
                showStatus('Error: ' + error.message, 'error');
            } finally {
                document.getElementById('addNumbersBtn').disabled = false;
            }
        }

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `show ${type}`;
            
            if (type === 'success') {
                setTimeout(() => {
                    status.classList.remove('show');
                }, 5000);
            }
        }
    </script>
    <script src="tool-registry.js"></script>
    <script src="premium-ui.js"></script>
</body>

</html>
