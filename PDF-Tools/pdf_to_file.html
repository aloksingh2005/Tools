<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#2f4a76">
    <title>Extract Text from PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root {
            --primary-color: #0ea5e9;
            --secondary-color: #64748b;
            --accent-color: #e0f2fe;
            --success-color: #10b981;
            --danger-color: #dc2626;
            --warning-color: #f59e0b;
            --border-radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            min-height: 100vh;
            padding: 20px;
            color: #0c4a6e;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .content {
            padding: 30px;
        }

        label {
            display: block;
            font-weight: 600;
            margin: 15px 0 8px;
            color: var(--secondary-color);
            font-size: 0.95em;
        }

        input[type="file"] {
            display: none;
        }

        #dropZone {
            border: 2px dashed #7dd3fc;
            border-radius: var(--border-radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--accent-color);
            margin-bottom: 20px;
        }

        #dropZone:hover,
        #dropZone.dragover {
            border-color: var(--primary-color);
            background: #f0f9ff;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        #dropZone i {
            font-size: 3em;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        #dropZone span {
            display: block;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        #dropZone small {
            color: var(--secondary-color);
        }

        #fileName {
            font-weight: 500;
            color: var(--primary-color);
            margin-top: 10px;
        }

        #info {
            margin: 15px 0;
            padding: 12px;
            border-radius: var(--border-radius);
            background: var(--accent-color);
            border-left: 4px solid var(--primary-color);
            font-weight: 500;
        }

        #info.success {
            background: #ecfdf5;
            border-color: var(--success-color);
            color: #166534;
        }

        #info.error {
            background: #fef2f2;
            border-color: var(--danger-color);
            color: #991b1b;
        }

        #info.warning {
            background: #fffbeb;
            border-color: var(--warning-color);
            color: #92400e;
        }

        .conversion-section {
            border: 1px solid #d1d5db;
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 20px;
            background: #f8fafc;
        }

        .conversion-section h3 {
            margin-bottom: 15px;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .radio-group {
            margin: 10px 0;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            margin: 8px 0;
            cursor: pointer;
        }

        .radio-group input[type="radio"] {
            margin-right: 10px;
            accent-color: var(--primary-color);
        }

        select, input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: var(--border-radius);
            margin: 5px 0 15px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .btn-group button {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover:not(:disabled) {
            background: #0284c7;
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .btn-group button {
            width: auto;
            padding: 10px 16px;
            font-size: 1em;
        }

        .note {
            background: #fffbeb;
            border-left: 4px solid var(--warning-color);
            padding: 12px;
            border-radius: 0 var(--border-radius) var(--border-radius) 0;
            margin: 15px 0;
            font-size: 0.9em;
        }

        .note h4 {
            margin-bottom: 5px;
            color: var(--warning-color);
        }

        @media (max-width: 480px) {
            .content {
                padding: 20px;
            }

            header h1 {
                font-size: 1.5em;
            }

            .btn-group {
                flex-direction: column;
            }
        }
    </style>
    <script src="theme-init.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="premium-theme.css">
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-file-lines"></i> Extract Text from PDF</h1>
            <p>Convert PDF pages into plain text or Word-compatible RTF format in your browser.</p>
        </header>

        <div class="content">
            <label for="fileInput">
                <div id="dropZone">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Drop your PDF here or click to browse</span>
                    <small>No upload needed. Text is extracted locally and kept private.</small>
                    <div id="fileName"></div>
                </div>
            </label>
            <input type="file" id="fileInput" accept=".pdf">

            <div id="info"></div>

            <!-- Text/Document Conversion Section -->
            <div class="conversion-section">
                <h3><i class="fas fa-file-alt"></i> Text Extraction Options</h3>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="textFormat" value="txt" checked>
                        <span>Plain Text (.txt)</span>
                    </label>
                    <label>
                        <input type="radio" name="textFormat" value="doc">
                        <span>RTF Document (.rtf) - Word Compatible</span>
                    </label>
                </div>
                
                <div class="note">
                    <h4><i class="fas fa-info-circle"></i> Text Extraction Mode</h4>
                    <p>This tool extracts the readable text layer from PDF pages. Visual layout and advanced formatting are not preserved.</p>
                </div>
                
                <button id="textConvertBtn" onclick="convertToText()" disabled>
                    <i class="fas fa-file-export"></i> EXTRACT TEXT
                </button>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const info = document.getElementById('info');
        const textConvertBtn = document.getElementById('textConvertBtn');
        const fileNameDiv = document.getElementById('fileName');

        let pdfDoc = null;

        // Drag-drop events
        fileInput.addEventListener('change', loadFile);
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') {
                const dt = new DataTransfer();
                dt.items.add(file);
                fileInput.files = dt.files;
                loadFile({ target: fileInput });
            }
        });

        async function loadFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            dropZone.querySelector('span').textContent = 'Processing...';
            fileNameDiv.textContent = file.name;
            info.textContent = 'Loading PDF...';
            info.className = '';

            try {
                const arrayBuffer = await file.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument(arrayBuffer).promise;
                info.innerHTML = `<i class="fas fa-check"></i> Loaded PDF with ${pdfDoc.numPages} pages!`;
                info.className = 'success';
                textConvertBtn.disabled = false;
            } catch (e) {
                info.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Couldn't load PDF: ${e.message}`;
                info.className = 'error';
                textConvertBtn.disabled = true;
                pdfDoc = null;
            } finally {
                dropZone.querySelector('span').textContent = 'Drop your PDF here or click to browse';
            }
        }

        async function convertToText() {
            if (!pdfDoc) {
                info.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Select a PDF first!';
                info.className = 'error';
                return;
            }

            const format = document.querySelector('input[name="textFormat"]:checked').value;

            textConvertBtn.disabled = true;
            textConvertBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Extracting Text...';
            info.textContent = 'Extracting text from PDF...';
            info.className = '';

            try {
                let fullText = '';
                const numPages = pdfDoc.numPages;

                for (let pageNum = 1; pageNum <= numPages; pageNum++) {
                    const page = await pdfDoc.getPage(pageNum);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += `--- Page ${pageNum} ---\n${pageText}\n\n`;
                }

                if (format === 'txt') {
                    const blob = new Blob([fullText], { type: 'text/plain' });
                    saveAs(blob, `pdf_text_${Date.now()}.txt`);
                    info.innerHTML = `<i class="fas fa-check-circle"></i> Success! Extracted text from ${numPages} pages as TXT.`;
                } else {
                    // Create a basic Word document (simple RTF format)
                    const escapedText = fullText.replace(/\n/g, '\\par\n');
                    const rtfContent = `{\\rtf1\\ansi\\ansicpg1252\\deff0\\deflang1033{\\fonttbl{\\f0\\fnil\\fcharset0 Calibri;}}\n\\viewkind4\\uc1\\pard\\f0\\fs22\n${escapedText}\n}`;
                    const blob = new Blob([rtfContent], { type: 'application/rtf' });
                    saveAs(blob, `pdf_text_${Date.now()}.rtf`);
                    info.innerHTML = `<i class="fas fa-check-circle"></i> Success! Extracted text from ${numPages} pages as RTF (Word compatible).`;
                }
                
                info.className = 'success';
            } catch (e) {
                info.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Text extraction failed: ${e.message}`;
                info.className = 'error';
            } finally {
                textConvertBtn.disabled = false;
                textConvertBtn.innerHTML = '<i class="fas fa-file-export"></i> EXTRACT TEXT';
            }
        }

        // Initial state
        textConvertBtn.disabled = true;
    </script>
    <script src="tool-registry.js"></script>
    <script src="premium-ui.js"></script>
</body>

</html>
