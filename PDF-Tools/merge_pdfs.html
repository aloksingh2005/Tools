<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#2f4a76">
    <title>PDF Merger (JS Edition)</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --primary-color: #16a34a;
            --secondary-color: #64748b;
            --accent-color: #f0fdf4;
            --success-color: #16a34a;
            --danger-color: #dc2626;
            --border-radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
            padding: 20px;
            color: #166534;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .content {
            padding: 30px;
        }

        label {
            display: block;
            font-weight: 600;
            margin: 15px 0 8px;
            color: var(--secondary-color);
            font-size: 0.95em;
        }

        input[type="file"] {
            display: none;
        }

        #dropZone {
            border: 2px dashed #86efac;
            border-radius: var(--border-radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--accent-color);
            margin-bottom: 20px;
        }

        #dropZone:hover,
        #dropZone.dragover {
            border-color: var(--primary-color);
            background: #dcfce7;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        #dropZone i {
            font-size: 3em;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        #dropZone span {
            display: block;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        #dropZone small {
            color: var(--secondary-color);
        }

        #fileList {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #d1d5db;
            border-radius: var(--border-radius);
            padding: 10px;
            background: white;
            margin-bottom: 20px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid #f3f4f6;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-name {
            flex-grow: 1;
            font-size: 0.9em;
        }

        .remove-btn {
            background: var(--danger-color);
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .remove-btn:hover {
            background: #b91c1c;
        }

        #info {
            margin: 15px 0;
            padding: 12px;
            border-radius: var(--border-radius);
            background: var(--accent-color);
            border-left: 4px solid var(--primary-color);
            font-weight: 500;
        }

        #info.success {
            background: #ecfdf5;
            border-color: var(--success-color);
            color: #166534;
        }

        #info.error {
            background: #fef2f2;
            border-color: var(--danger-color);
            color: #991b1b;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        button:hover:not(:disabled) {
            background: #15803d;
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-group button {
            width: auto;
            padding: 8px 16px;
            font-size: 1em;
        }

        @media (max-width: 480px) {
            .content {
                padding: 20px;
            }

            header h1 {
                font-size: 1.5em;
            }

            .btn-group {
                flex-direction: column;
            }
        }
    </style>
    <script src="theme-init.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="premium-theme.css">
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-compress"></i> PDF Merger</h1>
            <p>Merge multiple PDFs into one file and download instantly.</p>
        </header>

        <div class="content">
            <label for="fileInput">
                <div id="dropZone">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Drop your PDFs here or click to browse (multiple OK!)</span>
                    <small>Supports multiple PDF files.</small>
                </div>
            </label>
            <input type="file" id="fileInput" accept=".pdf" multiple>

            <div id="fileList"></div>

            <div class="btn-group">
                <button onclick="addFiles()"><i class="fas fa-plus"></i> Add Files</button>
                <button onclick="clearList()"><i class="fas fa-trash"></i> Clear List</button>
            </div>

            <div id="info"></div>

            <label>Output: (Downloads 'merged.pdf' – browser auto-save!)</label>
            <input type="text" placeholder="Auto-downloads to Downloads" disabled>

            <button id="mergeBtn" onclick="mergePDFs()" disabled>
                <i class="fas fa-merge"></i> Merge PDFs
            </button>
        </div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;

        // Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const info = document.getElementById('info');
        const mergeBtn = document.getElementById('mergeBtn');

        let selectedFiles = [];  // Array of {file, pdfDoc}

        // Drag-drop events
        fileInput.addEventListener('change', handleFiles);
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
            if (files.length > 0) {
                handleFiles({ target: { files } });
            }
        });
        dropZone.addEventListener('click', () => fileInput.click());

        function handleFiles(event) {
            const files = Array.from(event.target.files).filter(f => f.type === 'application/pdf');
            if (files.length === 0) return;

            Promise.all(files.map(async (file) => {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdfDoc = await PDFDocument.load(arrayBuffer);
                    return { file, pdfDoc };
                } catch (e) {
                    console.error(`Failed to load ${file.name}:`, e);
                    return null;
                }
            })).then((loaded) => {
                const valid = loaded.filter(item => item !== null);
                selectedFiles.push(...valid);
                updateFileList();
                info.innerHTML = `<i class="fas fa-check"></i> Added ${valid.length} PDFs!`;
                info.className = 'success';
                mergeBtn.disabled = selectedFiles.length === 0;
            });
        }

        function addFiles() {
            fileInput.click();
        }

        function clearList() {
            selectedFiles = [];
            updateFileList();
            info.innerHTML = '<i class="fas fa-trash"></i> List cleared!';
            info.className = '';
            mergeBtn.disabled = true;
        }

        function updateFileList() {
            fileList.innerHTML = '';
            selectedFiles.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `
                    <span class="file-name">${item.file.name}</span>
                    <button class="remove-btn" onclick="removeFile(${index})">Remove</button>
                `;
                fileList.appendChild(div);
            });
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
            info.innerHTML = '<i class="fas fa-minus"></i> File removed!';
            info.className = '';
            mergeBtn.disabled = selectedFiles.length === 0;
        }

        async function mergePDFs() {
            if (selectedFiles.length === 0) {
                info.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Add some PDFs first!';
                info.className = 'error';
                return;
            }

            mergeBtn.disabled = true;
            mergeBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Merging...';
            info.textContent = 'Merging PDFs...';

            try {
                const mergedDoc = await PDFDocument.create();
                for (let item of selectedFiles) {
                    const copiedPages = await mergedDoc.copyPages(item.pdfDoc, item.pdfDoc.getPageIndices());
                    copiedPages.forEach(page => mergedDoc.addPage(page));
                }

                const mergedBytes = await mergedDoc.save();
                const blob = new Blob([mergedBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `merged_${Date.now()}.pdf`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                info.innerHTML = `<i class="fas fa-check-circle"></i> Success! Merged ${selectedFiles.length} PDFs. Downloaded 'merged.pdf'!`;
                info.className = 'success';
            } catch (e) {
                info.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Merge failed: ${e.message}`;
                info.className = 'error';
            } finally {
                mergeBtn.disabled = false;
                mergeBtn.innerHTML = '<i class="fas fa-merge"></i> Merge PDFs';
            }
        }

        // Initial state
        mergeBtn.disabled = true;
    </script>
    <script src="tool-registry.js"></script>
    <script src="premium-ui.js"></script>
</body>

</html>
