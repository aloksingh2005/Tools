<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#2f4a76">
    <title>Add Watermark to PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
      :root {
        --primary-color: #06b6d4;
        --secondary-color: #64748b;
        --accent-color: #cffafe;
        --success-color: #10b981;
        --danger-color: #dc2626;
        --border-radius: 8px;
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #cffafe 0%, #a5f3fc 100%);
        min-height: 100vh;
        padding: 20px;
        color: #0e7490;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
        background: white;
        border-radius: var(--border-radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      header {
        background: var(--primary-color);
        color: white;
        padding: 20px;
        text-align: center;
      }

      header h1 {
        font-size: 1.8em;
        margin-bottom: 5px;
      }

      header p {
        opacity: 0.9;
        font-size: 0.95em;
      }

      .content {
        padding: 30px;
      }

      label {
        display: block;
        font-weight: 600;
        margin: 15px 0 8px;
        color: var(--secondary-color);
        font-size: 0.95em;
      }

      input[type="file"],
      input[type="color"] {
        display: none;
      }

      #dropZone {
        border: 2px dashed #67e8f9;
        border-radius: var(--border-radius);
        padding: 40px 20px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
        background: var(--accent-color);
        margin-bottom: 20px;
      }

      #dropZone:hover,
      #dropZone.dragover {
        border-color: var(--primary-color);
        background: #f0f9ff;
        transform: translateY(-2px);
        box-shadow: var(--shadow-hover);
      }

      #dropZone i {
        font-size: 3em;
        color: var(--primary-color);
        margin-bottom: 10px;
      }

      #dropZone span {
        display: block;
        font-size: 1.1em;
        margin-bottom: 5px;
      }

      #dropZone small {
        color: var(--secondary-color);
      }

      #fileName {
        font-weight: 500;
        color: var(--primary-color);
        margin-top: 10px;
      }

      #info {
        margin: 15px 0;
        padding: 12px;
        border-radius: var(--border-radius);
        background: var(--accent-color);
        border-left: 4px solid var(--primary-color);
        font-weight: 500;
      }

      #info.success {
        background: #ecfdf5;
        border-color: var(--success-color);
        color: #166534;
      }

      #info.error {
        background: #fef2f2;
        border-color: var(--danger-color);
        color: #991b1b;
      }

      .watermark-options {
        display: none;
        margin-top: 20px;
        padding: 20px;
        border: 1px solid #d1d5db;
        border-radius: var(--border-radius);
        background: #f8fafc;
      }

      .options-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-top: 15px;
      }

      .option-group {
        margin-bottom: 15px;
      }

      .option-group label {
        display: block;
        margin-bottom: 5px;
      }

      input[type="text"],
      input[type="number"],
      select {
        width: 100%;
        padding: 10px;
        border: 1px solid #d1d5db;
        border-radius: var(--border-radius);
        font-size: 1em;
      }

      .color-picker {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .color-preview {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 2px solid #d1d5db;
        cursor: pointer;
      }

      .preview-container {
        margin: 20px 0;
        text-align: center;
      }

      #previewCanvas {
        max-width: 100%;
        border: 1px solid #d1d5db;
        border-radius: var(--border-radius);
        background: #f1f5f9;
      }

      .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      .btn-group button {
        flex: 1;
      }

      button {
        width: 100%;
        padding: 14px;
        background: var(--primary-color);
        color: white;
        border: none;
        border-radius: var(--border-radius);
        font-size: 1.1em;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
      }

      button:hover:not(:disabled) {
        background: #0891b2;
        transform: translateY(-1px);
        box-shadow: var(--shadow-hover);
      }

      button:disabled {
        background: #9ca3af;
        cursor: not-allowed;
      }

      .watermark-type-selector {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
      }

      .watermark-type {
        flex: 1;
        padding: 15px;
        border: 2px solid #d1d5db;
        border-radius: var(--border-radius);
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
      }

      .watermark-type:hover {
        border-color: var(--primary-color);
        background: #f0f9ff;
      }

      .watermark-type.active {
        border-color: var(--primary-color);
        background: var(--accent-color);
      }

      .watermark-type i {
        font-size: 2em;
        margin-bottom: 10px;
        display: block;
      }

      @media (max-width: 480px) {
        .content {
          padding: 20px;
        }

        header h1 {
          font-size: 1.5em;
        }

        .options-grid {
          grid-template-columns: 1fr;
        }

        .btn-group {
          flex-direction: column;
        }
      }
    </style>
      <script src="theme-init.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="premium-theme.css">
</head>

  <body>
    <div class="container">
      <header>
        <h1><i class="fas fa-tint"></i> Add Watermark to PDF</h1>
        <p>Add a watermark or text as protection to your PDF files</p>
      </header>

      <div class="content">
        <label for="fileInput">
          <div id="dropZone">
            <i class="fas fa-cloud-upload-alt"></i>
            <span>Drop your PDF here or click to browse</span>
            <small>Supports all PDF files - Add text or image watermarks</small>
            <div id="fileName"></div>
          </div>
        </label>
        <input type="file" id="fileInput" accept=".pdf" />

        <div id="info"></div>

        <div class="watermark-options" id="watermarkOptions">
          <h3>Watermark Options</h3>

          <div class="watermark-type-selector">
            <div
              class="watermark-type active"
              data-type="text"
              id="textWatermarkType"
            >
              <i class="fas fa-font"></i>
              <div>Text Watermark</div>
            </div>
            <div
              class="watermark-type"
              data-type="image"
              id="imageWatermarkType"
            >
              <i class="fas fa-image"></i>
              <div>Image Watermark</div>
            </div>
          </div>

          <div class="options-grid">
            <div class="option-group">
              <label for="watermarkText">Watermark Text:</label>
              <input
                type="text"
                id="watermarkText"
                value="CONFIDENTIAL"
                placeholder="Enter watermark text"
              />
            </div>

            <div class="option-group">
              <label for="fontSize">Font Size:</label>
              <input
                type="number"
                id="fontSize"
                value="50"
                min="10"
                max="200"
              />
            </div>

            <div class="option-group">
              <label>Text Color:</label>
              <div class="color-picker">
                <input type="color" id="textColor" value="#ff0000" />
                <div
                  class="color-preview"
                  id="textColorPreview"
                  style="background-color: #ff0000"
                ></div>
              </div>
            </div>

            <div class="option-group">
              <label for="opacity">Opacity (0-1):</label>
              <input
                type="number"
                id="opacity"
                value="0.3"
                min="0"
                max="1"
                step="0.1"
              />
            </div>

            <div class="option-group">
              <label for="rotation">Rotation (degrees):</label>
              <input
                type="number"
                id="rotation"
                value="45"
                min="-360"
                max="360"
              />
            </div>

            <div class="option-group">
              <label for="position">Position:</label>
              <select id="position">
                <option value="center">Center</option>
                <option value="top-left">Top Left</option>
                <option value="top-right">Top Right</option>
                <option value="bottom-left">Bottom Left</option>
                <option value="bottom-right">Bottom Right</option>
                <option value="tile">Tile (Repeat)</option>
              </select>
            </div>
          </div>

          <div class="preview-container">
            <h4>Preview (Page 1)</h4>
            <canvas id="previewCanvas"></canvas>
          </div>

          <div class="btn-group">
            <button id="previewBtn" onclick="previewWatermark()">
              <i class="fas fa-eye"></i> Preview Watermark
            </button>
            <button
              id="downloadBtn"
              onclick="downloadWatermarkedPDF()"
              disabled
            >
              <i class="fas fa-download"></i> Download Watermarked PDF
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

      // Elements
      const dropZone = document.getElementById("dropZone");
      const fileInput = document.getElementById("fileInput");
      const info = document.getElementById("info");
      const fileNameDiv = document.getElementById("fileName");
      const watermarkOptions = document.getElementById("watermarkOptions");
      const downloadBtn = document.getElementById("downloadBtn");
      const previewCanvas = document.getElementById("previewCanvas");
      const textColorPreview = document.getElementById("textColorPreview");

      // Watermark type elements
      const textWatermarkType = document.getElementById("textWatermarkType");
      const imageWatermarkType = document.getElementById("imageWatermarkType");

      // Watermark options
      const watermarkText = document.getElementById("watermarkText");
      const fontSize = document.getElementById("fontSize");
      const textColor = document.getElementById("textColor");
      const opacity = document.getElementById("opacity");
      const rotation = document.getElementById("rotation");
      const position = document.getElementById("position");

      let pdfDoc = null;
      let originalFile = null;
      let watermarkType = "text"; // 'text' or 'image'

      // Set up color preview
      textColor.addEventListener("input", () => {
        textColorPreview.style.backgroundColor = textColor.value;
      });

      // Watermark type selection
      textWatermarkType.addEventListener("click", () => {
        textWatermarkType.classList.add("active");
        imageWatermarkType.classList.remove("active");
        watermarkType = "text";
        document.querySelector(".options-grid").style.display = "grid";
      });

      imageWatermarkType.addEventListener("click", () => {
        imageWatermarkType.classList.add("active");
        textWatermarkType.classList.remove("active");
        watermarkType = "image";
        document.querySelector(".options-grid").style.display = "none";
        info.innerHTML =
          '<i class="fas fa-info-circle"></i> Image watermark functionality coming soon. Currently only text watermarks are supported.';
        info.className = "";
      });

      // Drag-drop events
      fileInput.addEventListener("change", loadFile);
      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
      });
      dropZone.addEventListener("dragleave", () =>
        dropZone.classList.remove("dragover")
      );
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        const file = e.dataTransfer.files[0];
        if (file && file.type === "application/pdf") {
          const dt = new DataTransfer();
          dt.items.add(file);
          fileInput.files = dt.files;
          loadFile({ target: fileInput });
        }
      });

      async function loadFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        dropZone.querySelector("span").textContent = "Processing...";
        fileNameDiv.textContent = file.name;
        info.textContent = "Loading PDF...";
        info.className = "";

        try {
          // Store the original file to avoid ArrayBuffer detachment issues
          originalFile = file;
          const arrayBuffer = await file.arrayBuffer();
          pdfDoc = await pdfjsLib.getDocument(arrayBuffer).promise;

          info.innerHTML = `<i class="fas fa-check"></i> Loaded PDF with ${pdfDoc.numPages} pages!`;
          info.className = "success";

          watermarkOptions.style.display = "block";
          downloadBtn.disabled = false;

          // Show initial preview
          await previewWatermark();
        } catch (e) {
          info.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Couldn't load PDF: ${e.message}`;
          info.className = "error";
          pdfDoc = null;
          watermarkOptions.style.display = "none";
        } finally {
          dropZone.querySelector("span").textContent =
            "Drop your PDF here or click to browse";
        }
      }

      async function previewWatermark() {
        if (!pdfDoc) return;

        try {
          info.textContent = "Generating preview...";
          info.className = "";

          // Get the first page
          const page = await pdfDoc.getPage(1);
          const viewport = page.getViewport({ scale: 1.5 });

          // Set canvas dimensions
          previewCanvas.width = viewport.width;
          previewCanvas.height = viewport.height;

          const context = previewCanvas.getContext("2d");

          // Render the PDF page
          const renderContext = {
            canvasContext: context,
            viewport: viewport,
          };

          await page.render(renderContext).promise;

          // Draw watermark preview
          if (watermarkType === "text") {
            drawTextWatermark(
              context,
              previewCanvas.width,
              previewCanvas.height
            );
          } else {
            // Image watermark placeholder
            drawImageWatermarkPlaceholder(
              context,
              previewCanvas.width,
              previewCanvas.height
            );
          }

          info.innerHTML = '<i class="fas fa-check"></i> Preview updated!';
          info.className = "success";
        } catch (e) {
          info.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Preview failed: ${e.message}`;
          info.className = "error";
        }
      }

      function drawTextWatermark(context, width, height) {
        const text = watermarkText.value || "WATERMARK";
        const size = parseInt(fontSize.value) || 50;
        const color = textColor.value || "#ff0000";
        const alpha = parseFloat(opacity.value) || 0.3;
        const angle = ((parseFloat(rotation.value) || 45) * Math.PI) / 180;
        const pos = position.value || "center";

        context.save();
        context.globalAlpha = alpha;
        context.fillStyle = color;
        context.font = `${size}px Arial`;
        context.textAlign = "center";
        context.textBaseline = "middle";

        let x, y;

        switch (pos) {
          case "center":
            x = width / 2;
            y = height / 2;
            break;
          case "top-left":
            x = width * 0.2;
            y = height * 0.2;
            context.textAlign = "left";
            break;
          case "top-right":
            x = width * 0.8;
            y = height * 0.2;
            context.textAlign = "right";
            break;
          case "bottom-left":
            x = width * 0.2;
            y = height * 0.8;
            context.textAlign = "left";
            break;
          case "bottom-right":
            x = width * 0.8;
            y = height * 0.8;
            context.textAlign = "right";
            break;
          case "tile":
            // For preview, just show one instance in center
            x = width / 2;
            y = height / 2;
            break;
          default:
            x = width / 2;
            y = height / 2;
        }

        context.translate(x, y);
        context.rotate(angle);
        context.fillText(text, 0, 0);
        context.restore();
      }

      function drawImageWatermarkPlaceholder(context, width, height) {
        // Draw a placeholder for image watermark
        context.save();
        context.globalAlpha = 0.5;
        context.fillStyle = "#94a3b8";
        context.font = "20px Arial";
        context.textAlign = "center";
        context.textBaseline = "middle";
        context.fillText("Image Watermark Preview", width / 2, height / 2);
        context.restore();
      }

      async function downloadWatermarkedPDF() {
        if (!originalFile) {
          info.innerHTML =
            '<i class="fas fa-exclamation-triangle"></i> No PDF loaded!';
          info.className = "error";
          return;
        }

        downloadBtn.disabled = true;
        downloadBtn.innerHTML =
          '<i class="fas fa-spinner fa-spin"></i> Adding Watermark...';
        info.textContent = "Adding watermark to PDF...";
        info.className = "";

        try {
          // Create a fresh ArrayBuffer from the original file each time
          const arrayBuffer = await originalFile.arrayBuffer();

          // Use PDFLib to add watermark
          const { PDFDocument, rgb, StandardFonts } = PDFLib;
          const pdfDoc = await PDFDocument.load(arrayBuffer);

          const pages = pdfDoc.getPages();
          const font = await pdfDoc.embedFont(StandardFonts.Helvetica);

          const text = watermarkText.value || "WATERMARK";
          const size = parseInt(fontSize.value) || 50;
          const color = textColor.value || "#ff0000";
          const alpha = parseFloat(opacity.value) || 0.3;
          const angle = parseFloat(rotation.value) || 45;
          const pos = position.value || "center";

          // Convert hex color to RGB
          const r = parseInt(color.substr(1, 2), 16) / 255;
          const g = parseInt(color.substr(3, 2), 16) / 255;
          const b = parseInt(color.substr(5, 2), 16) / 255;
          const pdfColor = rgb(r, g, b);

          // Add watermark to each page
          for (let i = 0; i < pages.length; i++) {
            const page = pages[i];
            const { width, height } = page.getSize();

            if (pos === "tile") {
              // Tile watermark across the page
              const spacing = size * 3;
              for (let x = 0; x < width; x += spacing) {
                for (let y = 0; y < height; y += spacing) {
                  page.drawText(text, {
                    x: x,
                    y: y,
                    size: size,
                    font: font,
                    color: pdfColor,
                    opacity: alpha,
                    rotate: PDFLib.degrees(angle),
                  });
                }
              }
            } else {
              // Single watermark
              let x, y;

              switch (pos) {
                case "center":
                  x = width / 2;
                  y = height / 2;
                  break;
                case "top-left":
                  x = width * 0.2;
                  y = height * 0.8;
                  break;
                case "top-right":
                  x = width * 0.8;
                  y = height * 0.8;
                  break;
                case "bottom-left":
                  x = width * 0.2;
                  y = height * 0.2;
                  break;
                case "bottom-right":
                  x = width * 0.8;
                  y = height * 0.2;
                  break;
                default:
                  x = width / 2;
                  y = height / 2;
              }

              page.drawText(text, {
                x: x,
                y: y,
                size: size,
                font: font,
                color: pdfColor,
                opacity: alpha,
                rotate: PDFLib.degrees(angle),
                xSkew: PDFLib.degrees(0),
                ySkew: PDFLib.degrees(0),
              });
            }
          }

          // Save the watermarked PDF
          const pdfBytes = await pdfDoc.save();
          const blob = new Blob([pdfBytes], { type: "application/pdf" });
          const url = URL.createObjectURL(blob);

          const a = document.createElement("a");
          a.href = url;
          a.download = `watermarked_pdf_${Date.now()}.pdf`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);

          info.innerHTML =
            '<i class="fas fa-check-circle"></i> Success! Watermarked PDF downloaded!';
          info.className = "success";
        } catch (e) {
          info.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Watermarking failed: ${e.message}`;
          info.className = "error";
          console.error("Watermarking error:", e);
        } finally {
          downloadBtn.disabled = false;
          downloadBtn.innerHTML =
            '<i class="fas fa-download"></i> Download Watermarked PDF';
        }
      }

      // Initial state
      downloadBtn.disabled = true;
    </script>
      <script src="tool-registry.js"></script>
    <script src="premium-ui.js"></script>
</body>
</html>
