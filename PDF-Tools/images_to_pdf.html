<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#2f4a76">
    <title>Images to PDF (JS Edition)</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --primary-color: #f97316;
            --secondary-color: #64748b;
            --accent-color: #fed7aa;
            --success-color: #10b981;
            --danger-color: #dc2626;
            --border-radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fed7aa 0%, #fdba74 100%);
            min-height: 100vh;
            padding: 20px;
            color: #9a3412;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .content {
            padding: 30px;
        }

        label {
            display: block;
            font-weight: 600;
            margin: 15px 0 8px;
            color: var(--secondary-color);
            font-size: 0.95em;
        }

        input[type="file"] {
            display: none;
        }

        #dropZone {
            border: 2px dashed #fca5a5;
            border-radius: var(--border-radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--accent-color);
            margin-bottom: 20px;
        }

        #dropZone:hover,
        #dropZone.dragover {
            border-color: var(--primary-color);
            background: #feebc8;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        #dropZone i {
            font-size: 3em;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        #dropZone span {
            display: block;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        #dropZone small {
            color: var(--secondary-color);
        }

        #fileList {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #d1d5db;
            border-radius: var(--border-radius);
            padding: 10px;
            background: white;
            margin-bottom: 20px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid #f3f4f6;
            cursor: move;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item:hover {
            background: #fef3c7;
        }

        .file-name {
            flex-grow: 1;
            font-size: 0.9em;
        }

        .remove-btn {
            background: var(--danger-color);
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            margin-left: 10px;
        }

        .remove-btn:hover {
            background: #b91c1c;
        }

        #info {
            margin: 15px 0;
            padding: 12px;
            border-radius: var(--border-radius);
            background: var(--accent-color);
            border-left: 4px solid var(--primary-color);
            font-weight: 500;
        }

        #info.success {
            background: #ecfdf5;
            border-color: var(--success-color);
            color: #166534;
        }

        #info.error {
            background: #fef2f2;
            border-color: var(--danger-color);
            color: #991b1b;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        button:hover:not(:disabled) {
            background: #ea580c;
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-group button {
            width: auto;
            padding: 8px 16px;
            font-size: 1em;
        }

        @media (max-width: 480px) {
            .content {
                padding: 20px;
            }

            header h1 {
                font-size: 1.5em;
            }

            .btn-group {
                flex-direction: column;
            }

            .file-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
        }
    </style>
    <script src="theme-init.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="premium-theme.css">
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-images"></i> Images to PDF</h1>
            <p>Convert JPG/PNG images into a multi-page PDF in seconds.</p>
        </header>
        <div class="content">
            <div id="dropZone">
                <i class="fas fa-cloud-upload-alt"></i>
                <span>Drop your images here or click to browse (multiple OK!)</span>
                <small>Supports JPG and PNG files.</small>
            </div>
            <input type="file" id="fileInput" accept="image/jpeg,image/png" multiple>

            <div id="fileList"></div>

            <div class="btn-group">
                <button onclick="addFiles()"><i class="fas fa-plus"></i> Add Images</button>
                <button onclick="clearList()"><i class="fas fa-trash"></i> Clear List</button>
            </div>

            <div id="info"></div>

            <label>Output: (Downloads 'images_to_pdf_*.pdf')</label>
            <input type="text" placeholder="Auto-downloads to Downloads" disabled>

            <button id="convertBtn" onclick="convertToPDF()" disabled>
                <i class="fas fa-file-pdf"></i> Convert to PDF
            </button>
        </div>
    </div>
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const info = document.getElementById('info');
        const convertBtn = document.getElementById('convertBtn');
        let selectedFiles = [];

        fileInput.addEventListener('change', handleFiles);
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropZone.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/') && (f.type === 'image/jpeg' || f.type === 'image/png'));
            if (files.length > 0) {
                // Create a mock event object that handleFiles expects
                const mockEvent = { target: { files: files } };
                handleFiles(mockEvent);
            }
        });

        async function handleFiles(event) {
            const files = Array.from(event.target.files).filter(f => f.type === 'image/jpeg' || f.type === 'image/png');
            if (files.length === 0) return;
            selectedFiles.push(...files);
            updateFileList();
            info.innerHTML = `<i class="fas fa-check"></i> Added ${files.length} images!`;
            info.className = 'success';
            convertBtn.disabled = selectedFiles.length === 0;
        }

        function addFiles() { fileInput.click(); }
        function clearList() {
            selectedFiles = []; updateFileList();
            info.innerHTML = '<i class="fas fa-trash"></i> List cleared!';
            info.className = ''; convertBtn.disabled = true;
        }
        function updateFileList() {
            fileList.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.draggable = true;
                div.innerHTML = `
                    <span class="file-name">${file.name}</span>
                    <button class="remove-btn" onclick="removeFile(${index})">Remove</button>
                `;
                div.addEventListener('dragstart', (e) => e.dataTransfer.setData('text/plain', index));
                fileList.appendChild(div);
            });
            // Simple reorder on drop (basic drag-drop)
            fileList.addEventListener('dragover', (e) => e.preventDefault());
            fileList.addEventListener('drop', (e) => {
                e.preventDefault();
                const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
                const rect = fileList.getBoundingClientRect();
                const y = e.clientY - rect.top;
                const toIndex = Math.floor(y / (rect.height / selectedFiles.length));
                if (fromIndex !== toIndex) {
                    const [moved] = selectedFiles.splice(fromIndex, 1);
                    selectedFiles.splice(toIndex, 0, moved);
                    updateFileList();
                }
            });
        }
        function removeFile(index) {
            selectedFiles.splice(index, 1); updateFileList();
            info.innerHTML = '<i class="fas fa-minus"></i> Image removed!';
            info.className = ''; convertBtn.disabled = selectedFiles.length === 0;
        }

        async function convertToPDF() {
            if (selectedFiles.length === 0) { info.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Add some images first!'; info.className = 'error'; return; }
            convertBtn.disabled = true; convertBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Converting...'; info.textContent = 'Creating PDF...';
            try {
                const pdfDoc = await PDFLib.PDFDocument.create();
                const pages = [];
                for (let file of selectedFiles) {
                    const arrayBuffer = await file.arrayBuffer();
                    let embeddedImage;
                    if (file.type === 'image/jpeg') {
                        embeddedImage = await pdfDoc.embedJpg(arrayBuffer);
                    } else {
                        embeddedImage = await pdfDoc.embedPng(arrayBuffer);
                    }
                    const page = pdfDoc.addPage([PDFLib.PageSizes.A4[0], PDFLib.PageSizes.A4[1]]);
                    const { width, height } = embeddedImage.scale(1);
                    const scale = Math.min(PDFLib.PageSizes.A4[0] / width, PDFLib.PageSizes.A4[1] / height);
                    page.drawImage(embeddedImage, {
                        x: (PDFLib.PageSizes.A4[0] - width * scale) / 2,
                        y: (PDFLib.PageSizes.A4[1] - height * scale) / 2,
                        width: width * scale,
                        height: height * scale,
                    });
                    pages.push(page);
                }
                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `images_to_pdf_${Date.now()}.pdf`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                info.innerHTML = `<i class="fas fa-check-circle"></i> Success! Converted ${selectedFiles.length} images to PDF. Downloaded!`;
                info.className = 'success';
            } catch (e) {
                info.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Conversion failed: ${e.message}`;
                info.className = 'error';
            } finally {
                convertBtn.disabled = false; convertBtn.innerHTML = '<i class="fas fa-file-pdf"></i> Convert to PDF';
            }
        }
        convertBtn.disabled = true;
    </script>
    <script src="tool-registry.js"></script>
    <script src="premium-ui.js"></script>
</body>

</html>
