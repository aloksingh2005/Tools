<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#2f4a76">
    <title>Extract PDF Pages</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --primary-color: #059669;
            --secondary-color: #64748b;
            --accent-color: #d1fae5;
            --success-color: #10b981;
            --danger-color: #dc2626;
            --border-radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            min-height: 100vh;
            padding: 20px;
            color: #064e3b;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .content {
            padding: 30px;
        }

        label {
            display: block;
            font-weight: 600;
            margin: 15px 0 8px;
            color: var(--secondary-color);
            font-size: 0.95em;
        }

        input[type="file"] {
            display: none;
        }

        #dropZone {
            border: 2px dashed #6ee7b7;
            border-radius: var(--border-radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--accent-color);
            margin-bottom: 20px;
        }

        #dropZone:hover,
        #dropZone.dragover {
            border-color: var(--primary-color);
            background: #ecfdf5;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        #dropZone i {
            font-size: 3em;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        #dropZone p {
            margin: 10px 0;
            color: var(--secondary-color);
        }

        #dropZone .highlight {
            color: var(--primary-color);
            font-weight: 600;
        }

        .selection-controls {
            background: #f8fafc;
            padding: 15px;
            border-radius: var(--border-radius);
            margin: 20px 0;
            display: none;
        }

        .selection-controls.show {
            display: block;
        }

        .control-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .control-btn {
            padding: 8px 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .control-btn:hover {
            background: #047857;
        }

        .control-btn.secondary {
            background: #64748b;
        }

        .control-btn.secondary:hover {
            background: #475569;
        }

        .page-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: var(--border-radius);
            font-size: 1em;
            margin: 10px 0;
        }

        .page-input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .pages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: var(--border-radius);
        }

        .page-item {
            border: 3px solid #e2e8f0;
            border-radius: var(--border-radius);
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            position: relative;
        }

        .page-item:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .page-item.selected {
            border-color: var(--primary-color);
            background: var(--accent-color);
        }

        .page-item canvas {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .page-number {
            font-weight: 600;
            color: var(--secondary-color);
        }

        .page-item.selected .page-number {
            color: var(--primary-color);
        }

        .selection-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--primary-color);
            color: white;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
            font-weight: 600;
        }

        .page-item.selected .selection-badge {
            display: flex;
        }

        .selected-count {
            background: #ecfdf5;
            padding: 12px;
            border-radius: var(--border-radius);
            margin: 15px 0;
            text-align: center;
            font-weight: 600;
            color: var(--primary-color);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        button:hover {
            background: #047857;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }

        #status {
            padding: 12px;
            border-radius: var(--border-radius);
            margin: 15px 0;
            text-align: center;
            display: none;
        }

        #status.show {
            display: block;
        }

        #status.success {
            background: #d1fae5;
            color: var(--success-color);
        }

        #status.error {
            background: #fee2e2;
            color: var(--danger-color);
        }

        #status.loading {
            background: #e0f2fe;
            color: #0284c7;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: var(--border-radius);
            transition: background 0.3s;
            margin-bottom: 10px;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .info-box {
            background: #dbeafe;
            border-left: 4px solid #2563eb;
            padding: 12px;
            margin: 15px 0;
            border-radius: 4px;
        }

        .info-box p {
            color: #1e40af;
            font-size: 0.9em;
            margin: 0;
        }
    </style>
    <script src="theme-init.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="premium-theme.css">
</head>

<body>
    <div class="container">
        <header>
            <a href="index.html" class="back-button">
                <i class="fas fa-arrow-left"></i> Back to Tools
            </a>
            <h1><i class="fas fa-file-export"></i> Extract PDF Pages</h1>
            <p>Select and extract specific pages from your PDF</p>
        </header>

        <div class="content">
            <div class="info-box">
                <p><i class="fas fa-info-circle"></i> Click on pages to select them, or use the controls below for quick selection.</p>
            </div>

            <label for="pdfFile">
                <i class="fas fa-file-pdf"></i> Select PDF File
            </label>
            <div id="dropZone">
                <i class="fas fa-cloud-upload-alt"></i>
                <p><span class="highlight">Click to upload</span> or drag and drop</p>
                <p style="font-size: 0.9em;">Only PDF files are accepted</p>
            </div>
            <input type="file" id="pdfFile" accept=".pdf">

            <div id="status"></div>

            <div class="selection-controls" id="selectionControls">
                <div class="control-buttons">
                    <button class="control-btn" onclick="selectAll()">
                        <i class="fas fa-check-double"></i> Select All
                    </button>
                    <button class="control-btn secondary" onclick="deselectAll()">
                        <i class="fas fa-times"></i> Deselect All
                    </button>
                    <button class="control-btn" onclick="selectOdd()">
                        <i class="fas fa-list-ol"></i> Odd Pages
                    </button>
                    <button class="control-btn" onclick="selectEven()">
                        <i class="fas fa-list-ol"></i> Even Pages
                    </button>
                </div>

                <input type="text" class="page-input" id="pageRangeInput" 
                       placeholder="Enter page numbers (e.g., 1,3,5-8,10)">
                <button class="control-btn" style="width: auto;" onclick="selectByRange()">
                    <i class="fas fa-check"></i> Apply Selection
                </button>

                <div class="selected-count" id="selectedCount">
                    No pages selected
                </div>
            </div>

            <div class="pages-grid" id="pagesGrid"></div>

            <button id="extractBtn" disabled>
                <i class="fas fa-file-export"></i>
                Extract Selected Pages
            </button>
        </div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let selectedFile = null;
        let pdfDoc = null;
        let selectedPages = new Set();
        let totalPages = 0;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('pdfFile');
        const status = document.getElementById('status');
        const pagesGrid = document.getElementById('pagesGrid');
        const extractBtn = document.getElementById('extractBtn');
        const selectionControls = document.getElementById('selectionControls');

        // Drag and drop handlers
        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type === 'application/pdf') {
                handleFileSelection(files[0]);
            } else {
                showStatus('Please drop a valid PDF file', 'error');
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelection(e.target.files[0]);
            }
        });

        async function handleFileSelection(file) {
            selectedFile = file;
            selectedPages.clear();
            
            try {
                showStatus('Loading PDF... Please wait', 'loading');
                
                const arrayBuffer = await file.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                totalPages = pdfDoc.numPages;
                
                selectionControls.classList.add('show');
                await renderPages();
                
                showStatus(`✓ PDF loaded: ${totalPages} pages. Select pages to extract.`, 'success');
                updateSelectedCount();
                
            } catch (error) {
                console.error('Error loading PDF:', error);
                showStatus('Error loading PDF: ' + error.message, 'error');
            }
        }

        async function renderPages() {
            pagesGrid.innerHTML = '';
            
            for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: 0.3 });
                
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                
                await page.render({ canvasContext: context, viewport: viewport }).promise;
                
                const pageItem = document.createElement('div');
                pageItem.className = 'page-item';
                pageItem.dataset.page = pageNum;
                pageItem.innerHTML = `
                    <div class="selection-badge">${pageNum}</div>
                    <div class="page-number">Page ${pageNum}</div>
                `;
                pageItem.insertBefore(canvas, pageItem.firstChild);
                
                pageItem.addEventListener('click', () => togglePage(pageNum));
                pagesGrid.appendChild(pageItem);
            }
        }

        function togglePage(pageNum) {
            const pageItem = document.querySelector(`[data-page="${pageNum}"]`);
            
            if (selectedPages.has(pageNum)) {
                selectedPages.delete(pageNum);
                pageItem.classList.remove('selected');
            } else {
                selectedPages.add(pageNum);
                pageItem.classList.add('selected');
            }
            
            updateSelectedCount();
        }

        function selectAll() {
            selectedPages.clear();
            for (let i = 1; i <= totalPages; i++) {
                selectedPages.add(i);
            }
            updateUI();
        }

        function deselectAll() {
            selectedPages.clear();
            updateUI();
        }

        function selectOdd() {
            selectedPages.clear();
            for (let i = 1; i <= totalPages; i += 2) {
                selectedPages.add(i);
            }
            updateUI();
        }

        function selectEven() {
            selectedPages.clear();
            for (let i = 2; i <= totalPages; i += 2) {
                selectedPages.add(i);
            }
            updateUI();
        }

        function selectByRange() {
            const input = document.getElementById('pageRangeInput').value;
            const ranges = input.split(',');
            
            selectedPages.clear();
            
            ranges.forEach(range => {
                range = range.trim();
                if (range.includes('-')) {
                    const [start, end] = range.split('-').map(n => parseInt(n.trim()));
                    for (let i = start; i <= Math.min(end, totalPages); i++) {
                        if (i >= 1) selectedPages.add(i);
                    }
                } else {
                    const pageNum = parseInt(range);
                    if (pageNum >= 1 && pageNum <= totalPages) {
                        selectedPages.add(pageNum);
                    }
                }
            });
            
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('.page-item').forEach(item => {
                const pageNum = parseInt(item.dataset.page);
                if (selectedPages.has(pageNum)) {
                    item.classList.add('selected');
                } else {
                    item.classList.remove('selected');
                }
            });
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const count = selectedPages.size;
            const countElement = document.getElementById('selectedCount');
            
            if (count === 0) {
                countElement.textContent = 'No pages selected';
                extractBtn.disabled = true;
            } else {
                countElement.textContent = `${count} page${count > 1 ? 's' : ''} selected`;
                extractBtn.disabled = false;
            }
        }

        extractBtn.addEventListener('click', extractPages);

        async function extractPages() {
            if (selectedPages.size === 0) {
                showStatus('Please select at least one page', 'error');
                return;
            }

            try {
                showStatus('Extracting pages... Please wait', 'loading');
                extractBtn.disabled = true;

                const arrayBuffer = await selectedFile.arrayBuffer();
                const srcDoc = await PDFDocument.load(arrayBuffer);
                const newDoc = await PDFDocument.create();

                // Sort pages and copy them
                const sortedPages = Array.from(selectedPages).sort((a, b) => a - b);
                
                for (const pageNum of sortedPages) {
                    const [copiedPage] = await newDoc.copyPages(srcDoc, [pageNum - 1]);
                    newDoc.addPage(copiedPage);
                }

                const pdfBytes = await newDoc.save();

                // Download
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = selectedFile.name.replace('.pdf', '_extracted.pdf');
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                showStatus(`✓ Extracted ${selectedPages.size} pages successfully!`, 'success');

            } catch (error) {
                console.error('Error extracting pages:', error);
                showStatus('Error: ' + error.message, 'error');
            } finally {
                extractBtn.disabled = false;
            }
        }

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `show ${type}`;
            
            if (type === 'success') {
                setTimeout(() => {
                    status.classList.remove('show');
                }, 5000);
            }
        }
    </script>
    <script src="tool-registry.js"></script>
    <script src="premium-ui.js"></script>
</body>

</html>
