<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#2f4a76">
    <title>PDF Compressor (JS Edition)</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --primary-color: #f97316;
            --secondary-color: #64748b;
            --accent-color: #fef3c7;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --border-radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            min-height: 100vh;
            padding: 20px;
            color: #92400e;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .content {
            padding: 30px;
        }

        label {
            display: block;
            font-weight: 600;
            margin: 15px 0 8px;
            color: var(--secondary-color);
            font-size: 0.95em;
        }

        input[type="file"] {
            display: none;
        }

        #dropZone {
            border: 2px dashed #fdba74;
            border-radius: var(--border-radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--accent-color);
            margin-bottom: 20px;
        }

        #dropZone:hover,
        #dropZone.dragover {
            border-color: var(--primary-color);
            background: #fed7aa;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        #dropZone i {
            font-size: 3em;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        #dropZone span {
            display: block;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        #dropZone small {
            color: var(--secondary-color);
        }

        #fileName {
            font-weight: 500;
            color: var(--primary-color);
            margin-top: 10px;
        }

        #info,
        #sizeInfo {
            margin: 15px 0;
            padding: 12px;
            border-radius: var(--border-radius);
            background: var(--accent-color);
            border-left: 4px solid var(--primary-color);
            font-weight: 500;
        }

        #info.success {
            background: #ecfdf5;
            border-color: var(--success-color);
            color: #166534;
        }

        #info.error {
            background: #fef2f2;
            border-color: var(--danger-color);
            color: #991b1b;
        }

        select,
        input[type="text"],
        input[type="radio"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: var(--border-radius);
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        select:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.1);
        }

        input[type="radio"] {
            width: auto;
        }

        .radio-group {
            margin-left: 20px;
            margin-bottom: 10px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            padding: 8px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
            margin: 5px 0;
        }

        .radio-group label:hover {
            background: var(--accent-color);
        }

        .radio-group input[type="radio"] {
            margin-right: 10px;
            accent-color: var(--primary-color);
        }

        .note {
            font-size: 0.85em;
            color: #d97706;
            font-style: italic;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        button:hover:not(:disabled) {
            background: #ea580c;
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        @media (max-width: 480px) {
            .content {
                padding: 20px;
            }

            header h1 {
                font-size: 1.5em;
            }
        }
    </style>
    <script src="theme-init.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="premium-theme.css">
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-compress-arrows-alt"></i> PDF Compressor</h1>
            <p>Shrink PDFs with lossless or balanced compression, then download the result.</p>
        </header>

        <div class="content">
            <label for="fileInput">
                <div id="dropZone">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Drop your PDF here or click to browse</span>
                    <small>Supports multi-page PDFs.</small>
                    <div id="fileName"></div>
                </div>
            </label>
            <input type="file" id="fileInput" accept=".pdf">

            <div id="sizeInfo"></div>
            <div id="info"></div>

            <label>Compression Level:</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="level" value="low" checked>
                    <span>Low (lossless, minimal)</span>
                </label>
                <label>
                    <input type="radio" name="level" value="medium">
                    <span>Medium (lossless, balanced)</span>
                </label>
                <label>
                    <input type="radio" name="level" value="high">
                    <span>High (aggressive, may downsample images)*</span>
                </label>
            </div>
            <div class="note">*Note: JS uses lossless only; for aggressive, use desktop version with Ghostscript.</div>

            <label>Output: (Downloads 'compressed.pdf' – browser auto-save!)</label>
            <input type="text" placeholder="Auto-downloads to Downloads" disabled>

            <button id="compressBtn" onclick="compressPDF()">
                <i class="fas fa-fire"></i> Compress PDF
            </button>
        </div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;

        // Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const info = document.getElementById('info');
        const sizeInfo = document.getElementById('sizeInfo');
        const compressBtn = document.getElementById('compressBtn');
        const levelRadios = document.getElementsByName('level');
        const fileNameDiv = document.getElementById('fileName');

        let pdfDoc, originalSize;

        // Drag-drop events
        fileInput.addEventListener('change', loadFile);
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') {
                const dt = new DataTransfer();
                dt.items.add(file);
                fileInput.files = dt.files;
                loadFile({ target: fileInput });
            }
        });

        async function loadFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            dropZone.querySelector('span').textContent = 'Processing...';
            fileNameDiv.textContent = file.name;
            info.textContent = 'Loading PDF...';
            info.className = '';

            try {
                const arrayBuffer = await file.arrayBuffer();
                pdfDoc = await PDFDocument.load(arrayBuffer);
                originalSize = file.size;
                const totalPages = pdfDoc.getPageCount();
                sizeInfo.innerHTML = `Original: ${formatSize(originalSize)} | ${totalPages} pages`;
                info.innerHTML = `<i class="fas fa-check"></i> Loaded successfully!`;
                info.className = 'success';
                compressBtn.disabled = false;
            } catch (e) {
                info.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Load failed: ${e.message}`;
                info.className = 'error';
                compressBtn.disabled = true;
            }
        }

        function formatSize(bytes) {
            const units = ['B', 'KB', 'MB', 'GB'];
            let size = bytes;
            let unit = units[0];
            for (let i = 1; i < units.length; i++) {
                if (size < 1024) break;
                size /= 1024;
                unit = units[i];
            }
            return `${size.toFixed(1)} ${unit}`;
        }

        async function compressPDF() {
            if (!pdfDoc) {
                info.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Select a PDF first!';
                info.className = 'error';
                return;
            }

            const level = document.querySelector('input[name="level"]:checked').value;

            compressBtn.disabled = true;
            compressBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Compressing...';
            info.textContent = 'Compressing PDF...';

            try {
                let kwargs = { compressStreams: true };
                if (level === 'medium') {
                    // Simulate medium: more aggressive streams
                    kwargs.objectStreamMode = 1;  // Generate object streams if supported
                } else if (level === 'high') {
                    // High: Basic lossless + note (no Ghostscript in JS, so fallback to medium)
                    info.innerHTML += '<br><small>(High mode uses lossless in browser; for aggressive, try desktop!)</small>';
                    kwargs = { ...kwargs, objectStreamMode: 1 };
                }
                // Low: defaults

                const compressedBytes = await pdfDoc.save(kwargs);
                const blob = new Blob([compressedBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `compressed_${Date.now()}.pdf`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                const newSize = compressedBytes.length;
                const savings = ((originalSize - newSize) / originalSize * 100).toFixed(1);
                info.innerHTML = `<i class="fas fa-check-circle"></i> Compressed to ${formatSize(newSize)} (${savings}% saved)! Downloaded.`;
                info.className = 'success';
            } catch (e) {
                info.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Compression failed: ${e.message}`;
                info.className = 'error';
            } finally {
                compressBtn.disabled = false;
                compressBtn.innerHTML = '<i class="fas fa-fire"></i> Compress PDF';
            }
        }

        // Initial state
        compressBtn.disabled = true;
    </script>
    <script src="tool-registry.js"></script>
    <script src="premium-ui.js"></script>
</body>

</html>
