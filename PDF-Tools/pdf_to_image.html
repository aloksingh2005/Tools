<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#2f4a76">
    <title>PDF to Images Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <style>
        :root {
            --primary-color: #0ea5e9;
            --secondary-color: #64748b;
            --accent-color: #e0f2fe;
            --success-color: #10b981;
            --danger-color: #dc2626;
            --warning-color: #f59e0b;
            --border-radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            min-height: 100vh;
            padding: 20px;
            color: #0c4a6e;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .content {
            padding: 30px;
        }

        label {
            display: block;
            font-weight: 600;
            margin: 15px 0 8px;
            color: var(--secondary-color);
            font-size: 0.95em;
        }

        input[type="file"] {
            display: none;
        }

        #dropZone {
            border: 2px dashed #7dd3fc;
            border-radius: var(--border-radius);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--accent-color);
            margin-bottom: 20px;
        }

        #dropZone:hover,
        #dropZone.dragover {
            border-color: var(--primary-color);
            background: #f0f9ff;
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        #dropZone i {
            font-size: 3em;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        #dropZone span {
            display: block;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        #dropZone small {
            color: var(--secondary-color);
        }

        #fileName {
            font-weight: 500;
            color: var(--primary-color);
            margin-top: 10px;
        }

        #info {
            margin: 15px 0;
            padding: 12px;
            border-radius: var(--border-radius);
            background: var(--accent-color);
            border-left: 4px solid var(--primary-color);
            font-weight: 500;
        }

        #info.success {
            background: #ecfdf5;
            border-color: var(--success-color);
            color: #166534;
        }

        #info.error {
            background: #fef2f2;
            border-color: var(--danger-color);
            color: #991b1b;
        }

        #info.warning {
            background: #fffbeb;
            border-color: var(--warning-color);
            color: #92400e;
        }

        .conversion-section {
            border: 1px solid #d1d5db;
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 20px;
            background: #f8fafc;
        }

        .conversion-section h3 {
            margin-bottom: 15px;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .radio-group {
            margin: 10px 0;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            margin: 8px 0;
            cursor: pointer;
        }

        .radio-group input[type="radio"] {
            margin-right: 10px;
            accent-color: var(--primary-color);
        }

        select, input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: var(--border-radius);
            margin: 5px 0 15px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .btn-group button {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover:not(:disabled) {
            background: #0284c7;
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .btn-group button {
            width: auto;
            padding: 10px 16px;
            font-size: 1em;
        }

        .note {
            background: #fffbeb;
            border-left: 4px solid var(--warning-color);
            padding: 12px;
            border-radius: 0 var(--border-radius) var(--border-radius) 0;
            margin: 15px 0;
            font-size: 0.9em;
        }

        .note h4 {
            margin-bottom: 5px;
            color: var(--warning-color);
        }

        @media (max-width: 480px) {
            .content {
                padding: 20px;
            }

            header h1 {
                font-size: 1.5em;
            }

            .btn-group {
                flex-direction: column;
            }
        }
    </style>
    <script src="theme-init.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="premium-theme.css">
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-images"></i> PDF to Images</h1>
            <p>Extract every PDF page as PNG or JPEG and download everything as a ZIP file.</p>
        </header>

        <div class="content">
            <label for="fileInput">
                <div id="dropZone">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Drop your PDF here or click to browse</span>
                    <small>Fast, local extraction with no uploads and no server processing.</small>
                    <div id="fileName"></div>
                </div>
            </label>
            <input type="file" id="fileInput" accept=".pdf">

            <div id="info"></div>

            <!-- Image Conversion Section -->
            <div class="conversion-section">
                <h3><i class="fas fa-images"></i> Convert to Images</h3>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="imageFormat" value="png" checked>
                        <span>PNG (High Quality with Transparency)</span>
                    </label>
                    <label>
                        <input type="radio" name="imageFormat" value="jpeg">
                        <span>JPEG (Smaller File Size)</span>
                    </label>
                </div>
                
                <label>Image Quality (JPEG only):</label>
                <select id="jpegQuality">
                    <option value="0.95">High Quality (95%)</option>
                    <option value="0.9" selected>Good Quality (90%)</option>
                    <option value="0.85">Medium Quality (85%)</option>
                    <option value="0.8">Low Quality (80%)</option>
                </select>
                
                <label>Resolution Scale:</label>
                <select id="scale">
                    <option value="1">Normal (1x)</option>
                    <option value="2" selected>High (2x)</option>
                    <option value="3">Very High (3x)</option>
                    <option value="4">Ultra High (4x)</option>
                </select>
                
                <button id="imageConvertBtn" onclick="convertToImages()" disabled>
                    <i class="fas fa-file-image"></i> CONVERT TO IMAGES (ZIP)
                </button>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const info = document.getElementById('info');
        const imageConvertBtn = document.getElementById('imageConvertBtn');
        const fileNameDiv = document.getElementById('fileName');

        let pdfDoc = null;

        // Drag-drop events
        fileInput.addEventListener('change', loadFile);
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type === 'application/pdf') {
                const dt = new DataTransfer();
                dt.items.add(file);
                fileInput.files = dt.files;
                loadFile({ target: fileInput });
            }
        });

        async function loadFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            dropZone.querySelector('span').textContent = 'Processing...';
            fileNameDiv.textContent = file.name;
            info.textContent = 'Loading PDF...';
            info.className = '';

            try {
                const arrayBuffer = await file.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument(arrayBuffer).promise;
                info.innerHTML = `<i class="fas fa-check"></i> Loaded PDF with ${pdfDoc.numPages} pages!`;
                info.className = 'success';
                imageConvertBtn.disabled = false;
            } catch (e) {
                info.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Couldn't load PDF: ${e.message}`;
                info.className = 'error';
                imageConvertBtn.disabled = true;
                pdfDoc = null;
            } finally {
                dropZone.querySelector('span').textContent = 'Drop your PDF here or click to browse';
            }
        }

        async function convertToImages() {
            if (!pdfDoc) {
                info.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Select a PDF first!';
                info.className = 'error';
                return;
            }

            const format = document.querySelector('input[name="imageFormat"]:checked').value;
            const quality = parseFloat(document.getElementById('jpegQuality').value);
            const scale = parseFloat(document.getElementById('scale').value);

            imageConvertBtn.disabled = true;
            imageConvertBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Converting to Images...';
            info.textContent = 'Converting PDF pages to images...';
            info.className = '';

            try {
                const zip = new JSZip();
                const numPages = pdfDoc.numPages;

                for (let pageNum = 1; pageNum <= numPages; pageNum++) {
                    const page = await pdfDoc.getPage(pageNum);
                    const viewport = page.getViewport({ scale });
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: context, viewport }).promise;

                    let imgData;
                    if (format === 'jpeg') {
                        imgData = canvas.toDataURL('image/jpeg', quality);
                    } else {
                        imgData = canvas.toDataURL('image/png');
                    }

                    const base64Data = imgData.replace(/^data:image\/\w+;base64,/, '');
                    const binary = atob(base64Data);
                    const array = new Uint8Array(binary.length);
                    for (let i = 0; i < binary.length; i++) {
                        array[i] = binary.charCodeAt(i);
                    }
                    
                    const extension = format === 'jpeg' ? 'jpg' : 'png';
                    zip.file(`page_${pageNum.toString().padStart(3, '0')}.${extension}`, array);
                }

                const zipBlob = await zip.generateAsync({ type: 'blob' });
                saveAs(zipBlob, `pdf_images_${Date.now()}.zip`);
                info.innerHTML = `<i class="fas fa-check-circle"></i> Success! Converted ${numPages} pages to ${format.toUpperCase()} images in ZIP.`;
                info.className = 'success';
            } catch (e) {
                info.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Image conversion failed: ${e.message}`;
                info.className = 'error';
            } finally {
                imageConvertBtn.disabled = false;
                imageConvertBtn.innerHTML = '<i class="fas fa-file-image"></i> CONVERT TO IMAGES (ZIP)';
            }
        }

        // Initial state
        imageConvertBtn.disabled = true;
    </script>
    <script src="tool-registry.js"></script>
    <script src="premium-ui.js"></script>
</body>

</html>
