<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Font Preview Tool - Try Fonts Online Instantly</title>
    <meta name="description"
        content="Preview and test Google Fonts instantly online. Type your text and see it in different fonts. Copy CSS font-family code in one click.">
    <meta name="keywords" content="google fonts, font preview, typography, web fonts, css fonts">
    <meta name="author" content="Font Preview Tool">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Google Font Preview Tool - Try Fonts Online Instantly">
    <meta property="og:description"
        content="Preview and test Google Fonts instantly online. Type your text and see it in different fonts.">
    <meta property="og:type" content="website">

    <!-- Favicon -->
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔤%3C/text%3E%3C/svg%3E">

    <!-- Google Fonts Preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&family=Open+Sans:wght@300;400;500;600;700&family=Lato:wght@300;400;700&family=Montserrat:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&family=Source+Sans+Pro:wght@300;400;600;700&family=Nunito:wght@300;400;500;600;700&family=Raleway:wght@300;400;500;600;700&family=Ubuntu:wght@300;400;500;700&family=Playfair+Display:wght@400;500;600;700&family=Merriweather:wght@300;400;700&family=Oswald:wght@300;400;500;600;700&family=PT+Sans:wght@400;700&family=Libre+Baskerville:wght@400;700&family=Crimson+Text:wght@400;600;700&family=Fira+Sans:wght@300;400;500;600;700&family=Work+Sans:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <div class="header-content">
                <div class="title-section">
                    <h1>🔤 Font Preview Tool</h1>
                    <p>Discover and test Google Fonts instantly</p>
                </div>

                <!-- Dark Mode Toggle -->
                <div class="theme-toggle">
                    <button id="themeToggle" class="theme-btn" aria-label="Toggle dark mode">
                        <span class="theme-icon">🌙</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Controls Section -->
        <div class="controls-section">
            <!-- Text Input -->
            <div class="input-group">
                <label for="textInput">Your Text:</label>
                <textarea id="textInput" placeholder="The quick brown fox jumps over the lazy dog"
                    maxlength="500">The quick brown fox jumps over the lazy dog</textarea>
                <div class="char-counter">
                    <span id="charCount">43</span>/500
                </div>
            </div>

            <!-- Font Controls -->
            <div class="controls-grid">
                <div class="control-group">
                    <label for="fontSizeSlider">Font Size: <span id="fontSizeValue">24px</span></label>
                    <input type="range" id="fontSizeSlider" min="10" max="100" value="24" class="slider">
                </div>

                <div class="control-group">
                    <label for="textColor">Text Color:</label>
                    <div class="color-input-wrapper">
                        <input type="color" id="textColor" value="#333333">
                        <span class="color-value">#333333</span>
                    </div>
                </div>

                <div class="control-group">
                    <label for="bgColor">Background:</label>
                    <div class="color-input-wrapper">
                        <input type="color" id="bgColor" value="#ffffff">
                        <span class="color-value">#ffffff</span>
                    </div>
                </div>

                <div class="control-group">
                    <label for="fontCategory">Category:</label>
                    <select id="fontCategory">
                        <option value="all">All Fonts</option>
                        <option value="sans-serif">Sans Serif</option>
                        <option value="serif">Serif</option>
                        <option value="display">Display</option>
                        <option value="monospace">Monospace</option>
                    </select>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button id="resetBtn" class="btn btn-secondary">🔄 Reset</button>
                <button id="exportBtn" class="btn btn-primary">📥 Export as Image</button>
                <button id="loadMoreBtn" class="btn btn-accent">➕ Load More Fonts</button>
            </div>
        </div>

        <!-- Search and Filter -->
        <div class="search-section">
            <div class="search-wrapper">
                <input type="text" id="fontSearch" placeholder="Search fonts..." class="search-input">
                <span class="search-icon">🔍</span>
            </div>
            <div class="results-info">
                <span id="resultsCount">20 fonts</span> • <span id="loadingStatus">Ready</span>
            </div>
        </div>

        <!-- Font Preview Grid -->
        <main class="preview-section">
            <div id="fontGrid" class="font-grid">
                <!-- Font previews will be dynamically generated here -->
            </div>
        </main>

        <!-- Loading Indicator -->
        <div id="loadingIndicator" class="loading-indicator hidden">
            <div class="spinner"></div>
            <p>Loading fonts...</p>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">
        <span class="toast-message"></span>
    </div>

    <!-- Modal for Export Options -->
    <div id="exportModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Export Options</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <p>Choose export format:</p>
                <div class="export-options">
                    <button class="btn btn-primary" id="exportPNG">📷 PNG Image</button>
                    <button class="btn btn-secondary" id="exportCSS">📋 CSS Code</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
