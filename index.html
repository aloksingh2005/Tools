<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%230f766e'/%3E%3Cstop offset='100%25' stop-color='%230d9488'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='68' font-family='Arial,sans-serif' font-size='58' font-weight='bold' fill='white' text-anchor='middle'%3ET%3C/text%3E%3C/svg%3E" />
    <title>TechsOfTechs Tools | Free Online Utilities</title>
    <meta name="description" content="Free online tools for developers, students, creators, and productivity workflows." />
    <script>
        (function () {
            const savedTheme = localStorage.getItem('tools-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const appliedTheme = (savedTheme === 'dark' || (!savedTheme && prefersDark)) ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', appliedTheme);
        })();
    </script>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap"
        rel="stylesheet" />
</head>

<body>
    <!-- Main Navigation with Search -->
    <nav class="main-nav">
        <div class="container">
            <div class="nav-wrapper">
                <a href="#home" class="nav-brand">
                    <h2>TechsOfTechs Tools</h2>
                </a>

                <div class="nav-search">
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-input" placeholder="Search tools, keywords, or categories..." />
                        <button id="clear-search" class="clear-btn">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>

                <!-- Mobile Filters (only visible on mobile) -->
                <button id="mobile-filters-btn" class="mobile-filters-btn"><i class="fas fa-filter"></i> Filters</button>
                <div id="mobile-filters" class="mobile-filters-dropdown">
                    <button class="filter-btn-mobile active" data-category="all"><i class="fas fa-th"></i> All</button>
                    <button class="filter-btn-mobile" data-category="Developer Tools"><i class="fas fa-code"></i> Developer Tools</button>
                    <button class="filter-btn-mobile" data-category="Productivity"><i class="fas fa-calculator"></i> Productivity</button>
                    <button class="filter-btn-mobile" data-category="Media Tools"><i class="fas fa-image"></i> Media Tools</button>
                    <button class="filter-btn-mobile" data-category="AI & Chatbots"><i class="fas fa-robot"></i> AI & Chatbots</button>
                    <button class="filter-btn-mobile" data-category="Finance & Business"><i class="fas fa-chart-line"></i> Finance</button>
                </div>

                <!-- Theme Toggle moved inside navbar -->
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                    <i class="fas fa-moon"></i>
                    <span class="theme-toggle-label">Dark</span>
                </button>

            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero" id="home">
        <div class="container">
            <div class="hero-content">
                <div class="hero-text">
                    <h1 class="hero-title">TechsOfTechs Tools</h1>
                    <p class="hero-subtitle">
                        Fast, free, privacy-friendly tools for developers, students, creators, and everyday productivity.
                    </p>
                </div>
            </div>
        </div>
    </header>
    <!-- Category Filters (Simplified) -->
    <nav class="category-nav" id="categories">
        <div class="container">
            <div class="filters desktop-filters">
                <button class="filter-btn active" data-category="all">
                    <i class="fas fa-th"></i> All
                </button>
                <button class="filter-btn" data-category="Developer Tools">
                    <i class="fas fa-code"></i> Developer Tools
                </button>
                <button class="filter-btn" data-category="Productivity">
                    <i class="fas fa-calculator"></i> Productivity
                </button>
                <button class="filter-btn" data-category="Media Tools">
                    <i class="fas fa-image"></i> Media Tools
                </button>
                <button class="filter-btn" data-category="AI & Chatbots">
                    <i class="fas fa-robot"></i> AI & Chatbots
                </button>
                <button class="filter-btn" data-category="Finance & Business">
                    <i class="fas fa-chart-line"></i> Finance
                </button>
            </div>
        </div>
    </nav>

    <!-- Tools Section -->
    <main class="projects-section" id="tools">
        <div class="container">
            <!-- All Tools -->
            <div class="all-projects-section">
                <div class="projects-grid" id="projects-grid"></div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-left">
                    <h3>TechsOfTechs Tools</h3>
                    <p>Free online tools for developers, students, creators & productivity.</p>
                </div>
                <div class="footer-right">
                    <p>Built by Alok</p>
                    <p>&copy; 2026 TechsOfTechs Tools. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="projects-data.js"></script>
    <script src="script.js"></script>
</body>

</html>
